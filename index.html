<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Knowledge Garden</title>
    <meta property="og:title" content="Health Knowledge Garden — The Living Graph for Healthcare">
    <meta property="og:description" content="1M+ verified healthcare entities. Connected, verified, queryable in real time.">
    <meta property="og:image" content="https://chilly611.github.io/hkg/assets/og-image.png">
    <meta property="og:url" content="https://health.theknowledgegardens.com/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Health Knowledge Garden">
    <meta name="twitter:description" content="1M+ verified healthcare entities connected and queryable.">
    <meta name="twitter:image" content="https://chilly611.github.io/hkg/assets/og-image.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo-180.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..80,100..700;1,9..80,100..700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body,#root{width:100%;height:100%}
        body{background:#06060B;color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}
        h1,h2,h3,h4{font-family:'Instrument Serif',serif}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a10}::-webkit-scrollbar-thumb{background:#34D399;border-radius:3px}
        .lanes-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#06060B,#0f0f1a)}
        .lanes-logo{width:80px;height:80px;margin-bottom:1.5rem;opacity:0.9}
        .lanes-title{font-size:2.5rem;font-weight:600;margin-bottom:0.5rem;background:linear-gradient(135deg,#34D399,#22D3EE,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
        .lanes-sub{font-size:1.1rem;color:#888;margin-bottom:2.5rem;text-align:center}
        .lanes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;width:100%;max-width:1100px;margin-bottom:2rem}
        .lc{padding:1.5rem;background:rgba(13,13,20,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;transition:all 0.3s}
        .lc:hover{border-color:rgba(255,255,255,0.3);transform:translateY(-4px);box-shadow:0 12px 28px rgba(0,0,0,0.4)}
        .lc-clin{border-left:4px solid #34D399}.lc-pat{border-left:4px solid #A78BFA}.lc-ops{border-left:4px solid #22D3EE}.lc-exp{border-left:4px solid #D4A853}
        .lc-icon{font-size:2rem;margin-bottom:0.5rem}
        .lc h2{font-size:1.2rem;margin-bottom:0.2rem}
        .lc p{font-size:0.85rem;color:#aaa;line-height:1.3}
        .ls{padding:1rem 2rem;background:rgba(13,13,20,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:12px;text-align:center;font-size:0.95rem;color:#888}
        .ls strong{color:#34D399}
        .app{display:flex;flex-direction:column;height:100vh}
        .topbar{padding:0.6rem 1.2rem;background:rgba(13,13,20,0.95);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:0.75rem;flex-shrink:0;z-index:100;flex-wrap:wrap}
        .topbar-logo{width:28px;height:28px;opacity:0.8}
        .topbar-brand{font-size:0.95rem;font-weight:600}
        .spacer{flex:1}
        .pill{padding:0.25rem 0.6rem;border-radius:16px;font-size:0.75rem;border:1px solid}
        .pill-clin{border-color:#34D399;color:#34D399}.pill-pat{border-color:#A78BFA;color:#A78BFA}.pill-ops{border-color:#22D3EE;color:#22D3EE}.pill-exp{border-color:#D4A853;color:#D4A853}
        .btn{padding:0.3rem 0.7rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:5px;cursor:pointer;font-size:0.78rem;font-family:'DM Sans',sans-serif;transition:all 0.2s}
        .btn:hover{background:rgba(255,255,255,0.1)}.btn.active{background:rgba(52,211,153,0.15);border-color:#34D399;color:#34D399}
        .view-tabs{display:flex;gap:0.5rem;padding:0.6rem 1.2rem;background:rgba(13,13,20,0.6);border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;flex-wrap:wrap;align-items:center}
        .search-bar{padding:0.75rem 1.2rem;flex-shrink:0}
        .search-wrap{position:relative;max-width:600px;margin:0 auto}
        .search-input{width:100%;padding:0.65rem 1rem;background:rgba(13,13,20,0.9);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:0.9rem;font-family:'DM Sans',sans-serif}
        .search-input:focus{outline:none;border-color:rgba(52,211,153,0.5);box-shadow:0 0 12px rgba(52,211,153,0.1)}
        .sdrop{position:absolute;top:100%;left:0;right:0;margin-top:0.3rem;background:rgba(13,13,20,0.97);border:1px solid rgba(255,255,255,0.12);border-radius:8px;max-height:300px;overflow-y:auto;z-index:200;display:none}
        .sdrop.open{display:block}
        .sr{padding:0.6rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.15s}
        .sr:hover{background:rgba(255,255,255,0.05)}
        .sr-name{font-weight:600;font-size:0.85rem}.sr-detail{font-size:0.78rem;color:#888;margin-top:0.1rem}
        .content{flex:1;overflow-y:auto;padding:1rem 1.2rem}
        .badge{display:inline-block;padding:0.12rem 0.45rem;border-radius:3px;font-size:0.68rem;margin-left:0.4rem;font-weight:600}
        .b-provider{color:#34D399;border:1px solid #34D399}.b-drug{color:#F97316;border:1px solid #F97316}.b-diagnosis{color:#EF4444;border:1px solid #EF4444}.b-trial{color:#D4A853;border:1px solid #D4A853}.b-code{color:#22D3EE;border:1px solid #22D3EE}.b-exclusion{color:#F472B6;border:1px solid #F472B6}.b-taxonomy{color:#A78BFA;border:1px solid #A78BFA}.b-ndc{color:#8B5CF6;border:1px solid #8B5CF6}
        .hub{margin-bottom:1.5rem}
        .hub-hdr{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.75rem;padding-bottom:0.4rem;border-bottom:1px solid rgba(255,255,255,0.06)}
        .hub-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .hub-hdr h3{font-size:1.1rem;flex:1}.hub-cnt{font-size:0.8rem;color:#888}
        .egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.75rem}
        .ecard{padding:0.85rem 1rem;background:rgba(13,13,20,0.8);border:1px solid rgba(255,255,255,0.07);border-radius:8px;cursor:pointer;transition:all 0.2s}
        .ecard:hover{border-color:rgba(255,255,255,0.18);transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,0.25)}
        .ecard.expanded{grid-column:1/-1;border-color:rgba(52,211,153,0.3)}
        .ec-name{font-weight:600;font-size:0.88rem;display:flex;align-items:center;gap:0.4rem}
        .ec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
        .ec-detail{font-size:0.8rem;color:#999;margin-top:0.2rem;line-height:1.3}
        .ec-meta{font-size:0.72rem;color:#666;margin-top:0.25rem}
        .exp-panel{margin-top:0.6rem;padding-top:0.6rem;border-top:1px solid rgba(255,255,255,0.06)}
        .exp-row{display:flex;gap:0.4rem;margin-bottom:0.3rem;font-size:0.8rem}
        .exp-lbl{color:#888;min-width:80px;flex-shrink:0}.exp-val{color:#ccc;word-break:break-word}
        .rel-map{width:100%;overflow:hidden;background:rgba(6,6,11,0.5);border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:1.5rem}
        .rel-map svg{width:100%;height:auto;display:block}
        .stats-bar{padding:0.6rem 1.2rem;background:rgba(13,13,20,0.9);border-top:1px solid rgba(255,255,255,0.06);display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:0.5rem;text-align:center;flex-shrink:0}
        .sn{font-size:0.95rem;font-weight:600}.sn-prov{color:#34D399}.sn-drug{color:#F97316}.sn-dx{color:#EF4444}.sn-trial{color:#D4A853}.sn-code{color:#22D3EE}
        .sl{font-size:0.68rem;color:#888}
        .loading{display:flex;align-items:center;gap:0.4rem;color:#888;padding:2rem;justify-content:center}
        .dot{width:6px;height:6px;background:#34D399;border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
        .dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
        @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
        /* Data Scale Dashboard */
        .scale-section{width:100%;max-width:1100px;margin-bottom:2rem}
        .scale-title{font-size:1.3rem;text-align:center;margin-bottom:1rem;color:#ccc}
        .scale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.6rem;margin-bottom:1.5rem}
        .scale-card{padding:0.75rem;background:rgba(13,13,20,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:8px;text-align:center;transition:all 0.2s}
        .scale-card:hover{border-color:rgba(255,255,255,0.2)}
        .sc-num{font-size:1.4rem;font-weight:700;font-family:'Instrument Serif',serif}
        .sc-lbl{font-size:0.72rem;color:#888;margin-top:0.15rem}
        .sc-src{font-size:0.62rem;color:#555;margin-top:0.1rem}
        .multiply-section{background:rgba(13,13,20,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
        .multiply-title{font-size:1rem;font-weight:600;margin-bottom:0.75rem;color:#34D399;text-align:center}
        .multiply-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.75rem}
        .mult-row{display:flex;align-items:center;gap:0.5rem;font-size:0.82rem;padding:0.5rem 0.75rem;background:rgba(255,255,255,0.02);border-radius:6px}
        .mult-a{color:#ccc;flex:1}.mult-x{color:#555;font-size:0.75rem}.mult-b{color:#ccc;flex:1}.mult-eq{color:#555;font-size:0.75rem}.mult-r{color:#34D399;font-weight:700;font-size:0.9rem;text-align:right;min-width:70px}
        /* Browse table */
        .browse-section{margin-top:1rem}
        .browse-tabs{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.75rem}
        .browse-tab{padding:0.3rem 0.6rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:5px;cursor:pointer;font-size:0.75rem;color:#aaa;transition:all 0.15s}
        .browse-tab:hover{border-color:rgba(255,255,255,0.15)}
        .browse-tab.active{background:rgba(52,211,153,0.1);border-color:#34D399;color:#34D399}
        .browse-table{width:100%;border-collapse:collapse;font-size:0.78rem}
        .browse-table th{text-align:left;padding:0.5rem;border-bottom:1px solid rgba(255,255,255,0.1);color:#888;font-weight:600;position:sticky;top:0;background:#0a0a12}
        .browse-table td{padding:0.45rem 0.5rem;border-bottom:1px solid rgba(255,255,255,0.04);color:#ccc;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .browse-table tr:hover td{background:rgba(255,255,255,0.02)}
        .browse-wrap{max-height:350px;overflow-y:auto;border:1px solid rgba(255,255,255,0.06);border-radius:8px;background:rgba(6,6,11,0.5)}
        .browse-nav{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;justify-content:center}
        .browse-info{font-size:0.75rem;color:#888}
        /* Depth panel in lanes */
        .depth-panel{width:100%;max-width:1100px;margin-bottom:1.5rem;padding:1.25rem;background:rgba(13,13,20,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:10px}
        .depth-title{font-size:1.1rem;margin-bottom:0.5rem;text-align:center}
        .depth-desc{font-size:0.85rem;color:#aaa;text-align:center;line-height:1.4;margin-bottom:1rem}
        .depth-stats{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}
        .ds{text-align:center;min-width:80px}
        .ds-num{font-size:1.5rem;font-weight:700;font-family:'Instrument Serif',serif}
        .ds-lbl{font-size:0.7rem;color:#888}
        @media(max-width:768px){.lanes-grid{grid-template-columns:1fr}.lanes-title{font-size:1.8rem}.egrid{grid-template-columns:1fr}.stats-bar{grid-template-columns:repeat(3,1fr)}.scale-grid{grid-template-columns:repeat(2,1fr)}.multiply-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;
var API="https://opbrzaegvfyjpyyrmdfe.supabase.co/rest/v1";
var KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wYnJ6YWVndmZ5anB5eXJtZGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTgxODUsImV4cCI6MjA5MTI5NDE4NX0.zDAsWg36H0CCTO2wv7HAablyuYkqThAYGX23qcz7uKE";
var HDR={apikey:KEY,Authorization:"Bearer "+KEY};
function q(p){return fetch(API+p,{headers:HDR}).then(function(r){return r.json()}).catch(function(){return[]})}
function cnt(t){return fetch(API+"/"+t+"?select=id&limit=1",{method:"HEAD",headers:Object.assign({},HDR,{Prefer:"count=exact"})}).then(function(r){var g=r.headers.get("content-range");return g?parseInt(g.split("/")[1]||"0",10):0}).catch(function(){return 0})}

var COLORS={provider:"#34D399",drug:"#F97316",diagnosis:"#EF4444",trial:"#D4A853",code:"#22D3EE",exclusion:"#F472B6",taxonomy:"#A78BFA",ndc:"#8B5CF6"};
var LANES={
    clinician:{id:"clinician",icon:"\u{1F3E5}",title:"Clinician",sub:"I treat patients",desc:"Provider lookup, drug references, diagnosis codes, clinical trials",color:"#34D399",cls:"clin"},
    patient:{id:"patient",icon:"\u{1F49A}",title:"Patient / Caregiver",sub:"I want to understand my health",desc:"Plain-language explanations, find providers, understand medications",color:"#A78BFA",cls:"pat"},
    operations:{id:"operations",icon:"\u2699\uFE0F",title:"Operations",sub:"I manage healthcare systems",desc:"Compliance checks, billing codes, exclusion screening, analytics",color:"#22D3EE",cls:"ops"},
    explorer:{id:"explorer",icon:"\u{1F50D}",title:"Explorer",sub:"I'm curious about healthcare data",desc:"Browse the full knowledge graph, search everything",color:"#D4A853",cls:"exp"}
};

function loadClinician(){
    return Promise.all([
        q("/providers?credential=ilike.%25M.D.%25&limit=8&select=id,first_name,last_name,credential,status"),
        q("/drugs?or=(name.ilike.%25metformin%25,name.ilike.%25lisinopril%25,name.ilike.%25atorvastatin%25,name.ilike.%25amlodipine%25)&limit=6&select=id,name,drug_class,dosage_form"),
        q("/icd10_cm_codes?or=(code.eq.E119,code.eq.I10,code.eq.J449,code.eq.M545,code.eq.F329,code.eq.N390,code.eq.K219,code.eq.G4709)&select=id,code,description,is_billable"),
        q("/clinical_trials?status=ilike.%25recruiting%25&limit=4&select=id,title,status,phase,sponsor")
    ]).then(function(r){
        var d={providers:r[0],drugs:r[1],diagnoses:r[2],trials:r[3],taxonomies:[],rels:[]};
        d.providers.slice(0,3).forEach(function(p){d.diagnoses.slice(0,2).forEach(function(dx){d.rels.push({from:p.last_name,ft:"provider",to:dx.code,tt:"diagnosis",label:"treats"})})});
        d.providers.slice(0,2).forEach(function(p){d.drugs.slice(0,2).forEach(function(dr){d.rels.push({from:p.last_name,ft:"provider",to:dr.name.split(" ")[0],tt:"drug",label:"prescribes"})})});
        d.drugs.slice(0,3).forEach(function(dr,i){if(d.diagnoses[i])d.rels.push({from:dr.name.split(" ")[0],ft:"drug",to:d.diagnoses[i].code,tt:"diagnosis",label:"indicated for"})});
        d.trials.slice(0,2).forEach(function(t){if(d.providers[0])d.rels.push({from:d.providers[0].last_name,ft:"provider",to:(t.title||"").substring(0,25)+"..",tt:"trial",label:"enrolls in"})});
        if(d.providers.length>0){return q("/provider_taxonomies?provider_id=eq."+d.providers[0].id+"&limit=4&select=id,taxonomy_code,taxonomy_description,license_state,is_primary").then(function(tx){d.taxonomies=tx;tx.forEach(function(t){d.rels.push({from:d.providers[0].last_name,ft:"provider",to:(t.taxonomy_description||t.taxonomy_code||"").substring(0,25),tt:"taxonomy",label:"specializes"})});return d})}
        return d;
    });
}

function loadPatient(){
    return Promise.all([
        q("/icd10_cm_codes?or=(code.eq.E119,code.eq.E1165,code.eq.E1122,code.eq.E1140,code.eq.E1151,code.eq.E1121)&select=id,code,description,is_billable"),
        q("/drugs?or=(name.ilike.%25metformin%25,name.ilike.%25insulin%25,name.ilike.%25glipizide%25,name.ilike.%25sitagliptin%25)&limit=6&select=id,name,drug_class,dosage_form"),
        q("/providers?credential=ilike.%25M.D.%25&limit=5&select=id,first_name,last_name,credential"),
        q("/clinical_trials?title=ilike.%25diabetes%25&limit=4&select=id,title,status,phase,sponsor")
    ]).then(function(r){
        var d={diagnoses:r[0],drugs:r[1],providers:r[2],trials:r[3],rels:[]};
        var c="Type 2 Diabetes";
        d.diagnoses.forEach(function(dx){d.rels.push({from:c,ft:"diagnosis",to:dx.code+": "+dx.description.substring(0,20),tt:"diagnosis",label:"includes"})});
        d.drugs.forEach(function(dr){d.rels.push({from:c,ft:"diagnosis",to:dr.name.split(" ")[0],tt:"drug",label:"treated with"})});
        d.providers.slice(0,3).forEach(function(p){d.rels.push({from:c,ft:"diagnosis",to:"Dr. "+p.last_name,tt:"provider",label:"consult"})});
        d.trials.forEach(function(t){d.rels.push({from:c,ft:"diagnosis",to:(t.title||"").substring(0,25)+"..",tt:"trial",label:"research"})});
        return d;
    });
}

function loadOperations(){
    return Promise.all([
        q("/oig_exclusions?limit=6&select=id,entity_name"),
        q("/hcpcs_codes?limit=6&select=id,code,description,code_type"),
        q("/providers?limit=5&select=id,first_name,last_name,credential,status"),
        q("/ndc_codes?limit=5&select=id,ndc_code,proprietary_name,manufacturer")
    ]).then(function(r){
        var d={exclusions:r[0],hcpcs:r[1],providers:r[2],ndcCodes:r[3],rels:[]};
        var c="Compliance Hub";
        d.exclusions.slice(0,3).forEach(function(ex){d.rels.push({from:c,ft:"code",to:ex.entity_name,tt:"exclusion",label:"excluded"})});
        d.hcpcs.slice(0,3).forEach(function(cd){d.rels.push({from:c,ft:"code",to:cd.code,tt:"code",label:"billing"})});
        d.providers.slice(0,3).forEach(function(p){d.rels.push({from:c,ft:"code",to:p.last_name,tt:"provider",label:"monitors"})});
        d.ndcCodes.slice(0,2).forEach(function(n){d.rels.push({from:c,ft:"code",to:(n.proprietary_name||"").substring(0,20),tt:"ndc",label:"tracks"})});
        if(d.providers[0]&&d.exclusions[0])d.rels.push({from:d.providers[0].last_name,ft:"provider",to:d.exclusions[0].entity_name,tt:"exclusion",label:"screen against"});
        return d;
    });
}

function loadExplorer(){
    return Promise.all([
        q("/providers?limit=5&select=id,first_name,last_name,credential"),
        q("/drugs?limit=5&select=id,name,drug_class"),
        q("/icd10_cm_codes?limit=5&select=id,code,description"),
        q("/clinical_trials?limit=4&select=id,title,status,phase"),
        q("/hcpcs_codes?limit=4&select=id,code,description"),
        q("/oig_exclusions?limit=4&select=id,entity_name"),
        q("/ndc_codes?limit=3&select=id,ndc_code,proprietary_name,manufacturer"),
        q("/pubmed_citations?limit=3&select=id")
    ]).then(function(r){
        var d={providers:r[0],drugs:r[1],diagnoses:r[2],trials:r[3],hcpcs:r[4],exclusions:r[5],ndcCodes:r[6],pubs:r[7],rels:[]};
        d.rels.push({from:"Providers",ft:"provider",to:"Diagnoses",tt:"diagnosis",label:"treat"});
        d.rels.push({from:"Providers",ft:"provider",to:"Drugs",tt:"drug",label:"prescribe"});
        d.rels.push({from:"Drugs",ft:"drug",to:"Diagnoses",tt:"diagnosis",label:"indicated for"});
        d.rels.push({from:"Drugs",ft:"drug",to:"NDC Codes",tt:"ndc",label:"identified by"});
        d.rels.push({from:"Trials",ft:"trial",to:"Providers",tt:"provider",label:"enroll"});
        d.rels.push({from:"Trials",ft:"trial",to:"Drugs",tt:"drug",label:"investigate"});
        d.rels.push({from:"OIG Exclusions",ft:"exclusion",to:"Providers",tt:"provider",label:"screen"});

// SVG Relationship Map
function RelMap(props){
    var rels=props.rels||[];
    if(rels.length===0)return null;
    var nm={};
    rels.forEach(function(r){if(!nm[r.from])nm[r.from]={label:r.from,type:r.ft};if(!nm[r.to])nm[r.to]={label:r.to,type:r.tt}});
    var nodes=Object.keys(nm).map(function(k){return nm[k]});
    var W=900,HH=Math.max(420,nodes.length*28);
    var cx=W/2,cy=HH/2,rad=Math.min(cx,cy)-70;
    nodes.forEach(function(n,i){var a=2*Math.PI*i/nodes.length-Math.PI/2;n.x=cx+rad*Math.cos(a);n.y=cy+rad*Math.sin(a)});
    var lines=[],labels=[],nodeEls=[];
    rels.forEach(function(r,i){
        var f=nm[r.from],t=nm[r.to];if(!f||!t)return;
        var mx=(f.x+t.x)/2,my=(f.y+t.y)/2,dx=t.x-f.x,dy=t.y-f.y;
        var cpx=mx+(-dy*0.15),cpy=my+(dx*0.15);
        lines.push(h("path",{key:"l"+i,d:"M"+f.x+","+f.y+" Q"+cpx+","+cpy+" "+t.x+","+t.y,fill:"none",stroke:"rgba(255,255,255,0.1)",strokeWidth:1.5}));
        var lx=(f.x+cpx+t.x)/3,ly=(f.y+cpy+t.y)/3;
        labels.push(h("text",{key:"el"+i,x:lx,y:ly,fill:"rgba(255,255,255,0.35)",fontSize:9.5,textAnchor:"middle",fontFamily:"'DM Sans',sans-serif"},r.label));
    });
    nodes.forEach(function(n,i){
        var col=COLORS[n.type]||"#888";
        var tw=Math.max(55,Math.min(n.label.length*6.5+16,150)),th=26;
        nodeEls.push(h("g",{key:"n"+i},
            h("rect",{x:n.x-tw/2,y:n.y-th/2,width:tw,height:th,rx:5,fill:"rgba(13,13,20,0.9)",stroke:col,strokeWidth:1.5}),
            h("text",{x:n.x,y:n.y+4,fill:"#fff",fontSize:10.5,textAnchor:"middle",fontFamily:"'DM Sans',sans-serif",fontWeight:600},n.label.length>24?n.label.substring(0,22)+"..":n.label)
        ));
    });
    return h("div",{className:"rel-map"},h("svg",{viewBox:"0 0 "+W+" "+HH,xmlns:"http://www.w3.org/2000/svg"},lines,labels,nodeEls));
}

        ),
        h("div",{className:"browse-nav"},
            h("button",{className:"btn",onClick:function(){if(offset>0)setOffset(Math.max(0,offset-pageSize))},disabled:offset===0},"\u2190 Prev"),
            h("span",{className:"browse-info"},"Showing "+(offset+1)+"-"+(offset+rows.length)+" of "+totalForTab.toLocaleString()),
            h("button",{className:"btn",onClick:function(){if(offset+pageSize<totalForTab)setOffset(offset+pageSize)},disabled:offset+pageSize>=totalForTab},"Next \u2192")
        )
    );
}

function LanesScreen(props){
    var c=props.stats.counts||{};
    return h("div",{className:"lanes-screen",style:{justifyContent:"flex-start",paddingTop:"2rem"}},
        h("img",{className:"lanes-logo",src:"assets/logo-transparent.png",alt:"HKG"}),
        h("h1",{className:"lanes-title"},"Health Knowledge Garden"),
        h("p",{className:"lanes-sub"},"The living graph for healthcare. Every provider, drug, diagnosis, trial, and code \u2014 connected."),
        h(ScaleDashboard,{counts:c}),
        h("div",{style:{width:"100%",maxWidth:"1100px",marginBottom:"1.5rem"}},h(BrowseTable,{counts:c})),
        h("h3",{style:{fontSize:"1.2rem",marginBottom:"1rem",color:"#ccc"}},"Choose your lens into the data:"),
        h("div",{className:"lanes-grid"},Object.values(LANES).map(function(ln){return h("div",{key:ln.id,className:"lc lc-"+ln.cls,onClick:function(){props.onSelect(ln.id)}},h("div",{className:"lc-icon"},ln.icon),h("h2",null,ln.title),h("p",{style:{marginBottom:"0.3rem",fontSize:"0.82rem"}},ln.sub),h("p",null,ln.desc))})),
        h("div",{className:"ls"},h("strong",null,props.stats.total.toLocaleString())," entities across 10 federal sources")
    );
}

function App(){
    var s1=useState(null),lane=s1[0],setLane=s1[1];
    var s2=useState({total:1102176,counts:{}}),stats=s2[0],setStats=s2[1];
    useEffect(function(){
        var tables=["providers","drugs","icd10_cm_codes","ndc_codes","clinical_trials","oig_exclusions","pubmed_citations","hcpcs_codes","icd10_pcs_codes","provider_taxonomies"];
        Promise.all(tables.map(cnt)).then(function(vals){var c={},t=0;tables.forEach(function(tbl,i){c[tbl]=vals[i];t+=vals[i]});if(t>0)setStats({total:t,counts:c})}).catch(function(){});
    },[]);
    if(!lane)return h(LanesScreen,{onSelect:setLane,stats:stats});
    return h(AppScreen,{lane:lane,onBack:function(){setLane(null)},stats:stats});
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
