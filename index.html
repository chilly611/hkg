<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Knowledge Garden</title>
    <meta property="og:title" content="Health Knowledge Garden — The Operating System for Healthcare">
    <meta property="og:description" content="12M+ verified healthcare entities. Connected, verified, queryable in real time.">
    <meta property="og:url" content="https://health.theknowledgegardens.com/">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..700;1,9..40,100..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#070710;--bg2:#0c0c18;--bg3:#111122;--bg4:#171730;
            --emerald:#34D399;--emerald-dim:rgba(52,211,153,0.12);
            --violet:#A78BFA;--violet-dim:rgba(167,139,250,0.12);
            --cyan:#22D3EE;--cyan-dim:rgba(34,211,238,0.12);
            --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.12);
            --orange:#F97316;--red:#EF4444;--pink:#F472B6;--purple:#8B5CF6;
            --text:#eef0f6;--text2:#94a3b8;--text3:#475569;
            --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--border3:rgba(255,255,255,0.16);
            --glass:rgba(12,12,24,0.7);--glass2:rgba(12,12,24,0.92);
            --radius:14px;--radius-sm:8px;--radius-xs:5px;
        }
        html,body,#root{width:100%;height:100%;overflow:hidden}
        body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
        h1,h2,h3,h4{font-family:'Instrument Serif',serif;font-weight:400}
        code,.mono{font-family:'JetBrains Mono',monospace}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(52,211,153,0.25);border-radius:2px}
        button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
        input{font-family:inherit;color:inherit}
        a{color:var(--emerald);text-decoration:none}

        /* === CANVAS BG === */
        #canvas-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35}

        /* === ANIMATIONS === */
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,0.4)}50%{opacity:0.6;box-shadow:0 0 0 4px rgba(52,211,153,0)}}
        @keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:-800px 0}100%{background-position:800px 0}}
        @keyframes graphPulse{0%,100%{r:4}50%{r:6}}
        .fade-up{animation:fadeUp 0.5s ease-out both}
        .fade-in{animation:fadeIn 0.4s ease-out both}
        .delay-1{animation-delay:0.08s}.delay-2{animation-delay:0.16s}.delay-3{animation-delay:0.24s}
        .delay-4{animation-delay:0.32s}.delay-5{animation-delay:0.40s}

        /* === SKELETON === */
        .skeleton{background:linear-gradient(90deg,var(--bg3) 0%,var(--bg4) 40%,var(--bg3) 80%);background-size:800px 100%;animation:shimmer 1.8s infinite;border-radius:var(--radius-xs)}
        .skel-line{height:14px;margin-bottom:8px;border-radius:3px}
        .skel-block{height:80px;border-radius:var(--radius-sm)}

        /* === LAYOUT === */
        .app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

        /* === TOPBAR === */
        .topbar{
            height:52px;padding:0 1.25rem;display:flex;align-items:center;gap:0.75rem;
            background:var(--glass2);backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;
        }
        .topbar-logo{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
        .topbar-logo img{width:30px;height:30px;border-radius:6px;object-fit:cover}
        .topbar-brand{font-family:'Instrument Serif',serif;font-size:1rem;letter-spacing:-0.02em;white-space:nowrap}
        .topbar-brand span{color:var(--emerald)}
        .spacer{flex:1}
        .topbar-stat{font-size:0.7rem;color:var(--text3);display:flex;align-items:center;gap:0.3rem}
        .topbar-stat strong{color:var(--emerald);font-size:0.75rem;font-family:'JetBrains Mono',monospace}
        .live-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
        .nav-pills{display:flex;gap:0.3rem;align-items:center}
        .nav-pill{padding:0.3rem 0.65rem;border-radius:6px;font-size:0.78rem;color:var(--text2);transition:all 0.2s;border:1px solid transparent}
        .nav-pill:hover{background:rgba(255,255,255,0.04)}
        .nav-pill.active{background:var(--emerald-dim);border-color:rgba(52,211,153,0.25);color:var(--emerald)}

        .main{flex:1;overflow:hidden;display:flex;flex-direction:column}

        /* === HOME === */
        .home{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.25rem 4rem}
        .hero{text-align:center;max-width:680px;margin-bottom:2rem}
        .hero-logo{width:100px;height:100px;border-radius:16px;object-fit:cover;margin-bottom:0.75rem;filter:drop-shadow(0 0 30px rgba(52,211,153,0.12));animation:logoFloat 6s ease-in-out infinite}
        .hero h1{font-size:2.8rem;line-height:1.08;margin-bottom:0.5rem;letter-spacing:-0.03em}
        .hero h1 .gr{background:linear-gradient(135deg,var(--emerald),var(--cyan) 50%,var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .hero p{font-size:0.95rem;color:var(--text2);line-height:1.5;max-width:500px;margin:0 auto}
        .hero-badges{display:flex;gap:0.4rem;justify-content:center;flex-wrap:wrap;margin-top:0.75rem}
        .hero-badge{font-size:0.65rem;padding:0.18rem 0.45rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.02em}

        /* === QUICK ACTIONS === */
        .quick-actions{display:flex;gap:0.6rem;width:100%;max-width:680px;margin-bottom:1.5rem}
        .qa-btn{
            flex:1;padding:0.7rem 0.5rem;border-radius:var(--radius-sm);
            border:1px solid var(--border);background:var(--glass);
            backdrop-filter:blur(12px);text-align:center;
            transition:all 0.25s cubic-bezier(.22,1,.36,1);
            display:flex;flex-direction:column;align-items:center;gap:0.25rem;
        }
        .qa-btn:hover{transform:translateY(-3px);border-color:var(--border3);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
        .qa-btn .qa-icon{font-size:1.3rem}
        .qa-btn .qa-label{font-size:0.72rem;font-weight:600;letter-spacing:0.02em}
        .qa-btn .qa-sub{font-size:0.62rem;color:var(--text3)}
        .qa-btn.emerald:hover{border-color:rgba(52,211,153,0.3);background:var(--emerald-dim)}
        .qa-btn.violet:hover{border-color:rgba(167,139,250,0.3);background:var(--violet-dim)}
        .qa-btn.cyan:hover{border-color:rgba(34,211,238,0.3);background:var(--cyan-dim)}
        .qa-btn.amber:hover{border-color:rgba(245,158,11,0.3);background:var(--amber-dim)}

        /* === SEARCH === */
        .search-hero{width:100%;max-width:640px;margin-bottom:1.75rem}
        .search-box{position:relative}
        .search-input{
            width:100%;padding:0.85rem 1.1rem 0.85rem 2.8rem;
            background:var(--glass);backdrop-filter:blur(20px);
            border:1px solid var(--border2);border-radius:var(--radius);
            font-size:0.95rem;color:var(--text);outline:none;transition:all 0.25s;
        }
        .search-input:focus{border-color:rgba(52,211,153,0.35);box-shadow:0 0 0 3px rgba(52,211,153,0.06),0 8px 32px rgba(0,0,0,0.3)}
        .search-input::placeholder{color:var(--text3)}
        .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem}
        .search-kbd{position:absolute;right:0.7rem;top:50%;transform:translateY(-50%);padding:0.12rem 0.45rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;font-size:0.65rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
        .search-dropdown{
            position:absolute;top:calc(100% + 6px);left:0;right:0;
            background:var(--glass2);backdrop-filter:blur(24px);
            border:1px solid var(--border2);border-radius:var(--radius);
            max-height:400px;overflow-y:auto;z-index:200;
            box-shadow:0 16px 48px rgba(0,0,0,0.5);display:none;
        }
        .search-dropdown.open{display:block}
        .search-cat{padding:0.45rem 1rem 0.2rem;font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
        .search-result{padding:0.55rem 1rem;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:0.7rem;border-bottom:1px solid rgba(255,255,255,0.025)}
        .search-result:hover{background:rgba(52,211,153,0.05)}
        .sr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
        .sr-info{flex:1;min-width:0}
        .sr-name{font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sr-detail{font-size:0.73rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sr-type{font-size:0.6rem;padding:0.12rem 0.35rem;border-radius:3px;border:1px solid;flex-shrink:0;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}

        /* === PULSE GRID === */
        .pulse-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
            gap:0.6rem;width:100%;max-width:900px;margin-bottom:2rem;
        }
        .pulse-card{
            padding:0.75rem 0.8rem;background:var(--glass);backdrop-filter:blur(12px);
            border:1px solid var(--border);border-radius:var(--radius-sm);
            text-align:center;transition:all 0.3s cubic-bezier(.22,1,.36,1);
            cursor:pointer;position:relative;overflow:hidden;
        }
        .pulse-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.3s}
        .pulse-card:hover{border-color:var(--border3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.25)}
        .pulse-card:hover::after{opacity:1}
        .pc-num{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:600;line-height:1.2;transition:color 0.3s}
        .pc-label{font-size:0.7rem;color:var(--text2);margin-top:0.1rem}
        .pc-src{font-size:0.58rem;color:var(--text3);margin-top:0.05rem;font-family:'JetBrains Mono',monospace}

        /* === LANE CARDS === */
        .lanes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:0.8rem;width:100%;max-width:1000px;margin-bottom:2rem}
        .lane-card{
            padding:1.25rem;background:var(--glass);backdrop-filter:blur(12px);
            border:1px solid var(--border);border-radius:var(--radius);
            cursor:pointer;transition:all 0.35s cubic-bezier(.22,1,.36,1);
            position:relative;overflow:hidden;
        }
        .lane-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px}
        .lane-card:hover{border-color:var(--border3);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,0.35)}
        .lane-card.clin::before{background:var(--emerald)}.lane-card.clin:hover{box-shadow:0 12px 36px rgba(0,0,0,0.35),0 0 30px rgba(52,211,153,0.05)}
        .lane-card.pat::before{background:var(--violet)}.lane-card.pat:hover{box-shadow:0 12px 36px rgba(0,0,0,0.35),0 0 30px rgba(167,139,250,0.05)}
        .lane-card.ops::before{background:var(--cyan)}.lane-card.ops:hover{box-shadow:0 12px 36px rgba(0,0,0,0.35),0 0 30px rgba(34,211,238,0.05)}
        .lane-card.exp::before{background:var(--amber)}.lane-card.exp:hover{box-shadow:0 12px 36px rgba(0,0,0,0.35),0 0 30px rgba(245,158,11,0.05)}
        .lc-icon{font-size:1.6rem;margin-bottom:0.4rem}
        .lane-card h2{font-size:1.15rem;margin-bottom:0.1rem}
        .lc-sub{font-size:0.78rem;color:var(--text2);font-style:italic;margin-bottom:0.25rem}
        .lane-card p{font-size:0.78rem;color:var(--text3);line-height:1.4}

        /* === ENTITY VIEW === */
        .entity-view{flex:1;overflow-y:auto;padding:1.5rem}
        .ev-back{display:inline-flex;align-items:center;gap:0.35rem;font-size:0.8rem;color:var(--text2);margin-bottom:1rem;cursor:pointer;transition:color 0.15s}
        .ev-back:hover{color:var(--emerald)}
        .ev-header{margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:1rem}
        .ev-header-info{flex:1}
        .ev-type{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;padding:0.18rem 0.45rem;border-radius:4px;border:1px solid;display:inline-block;margin-bottom:0.45rem;font-weight:600}
        .ev-name{font-size:1.8rem;line-height:1.2;margin-bottom:0.2rem}
        .ev-sub{font-size:0.9rem;color:var(--text2)}
        .ev-actions{display:flex;gap:0.4rem;flex-shrink:0}
        .ev-action-btn{
            padding:0.4rem 0.75rem;font-size:0.75rem;border-radius:6px;
            border:1px solid var(--border2);background:var(--glass);
            display:flex;align-items:center;gap:0.3rem;transition:all 0.2s;
        }
        .ev-action-btn:hover{background:var(--emerald-dim);border-color:rgba(52,211,153,0.3)}
        .ev-action-btn.active{background:var(--emerald-dim);border-color:rgba(52,211,153,0.4);color:var(--emerald)}
        .ev-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1.25rem}
        @media(max-width:768px){.ev-grid{grid-template-columns:1fr}}
        .ev-section{padding:0.9rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm)}
        .ev-section h3{font-size:0.92rem;margin-bottom:0.6rem;display:flex;align-items:center;gap:0.35rem}
        .ev-section h3 .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
        .ev-entity-link{display:flex;align-items:center;gap:0.5rem;padding:0.4rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;margin-bottom:0.3rem}
        .ev-entity-link:hover{border-color:rgba(52,211,153,0.4);background:rgba(52,211,153,0.04)}
        .ev-entity-link-name{flex:1;font-size:0.8rem;font-weight:600}
        .ev-entity-link-type{font-size:0.65rem;color:var(--text3)}

        /* === VERIFY VIEW === */
        .verify-view{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;align-items:center}
        .verify-container{width:100%;max-width:900px}
        .verify-header{text-align:center;margin-bottom:2rem}
        .verify-header h1{font-size:2.2rem;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--cyan),var(--emerald));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .verify-header p{color:var(--text2);font-size:0.95rem}
        .verify-input-group{display:flex;gap:0.5rem;margin-bottom:2rem}
        .verify-input{flex:1;padding:0.85rem 1rem;background:var(--glass);border:1px solid var(--border2);border-radius:var(--radius);font-size:0.95rem;color:var(--text);outline:none;transition:all 0.25s}
        .verify-input:focus{border-color:rgba(52,211,153,0.35);box-shadow:0 0 0 3px rgba(52,211,153,0.06)}
        .verify-btn{padding:0.85rem 1.5rem;background:var(--emerald);color:var(--bg);border-radius:var(--radius);font-weight:600;font-size:0.95rem;transition:all 0.25s;cursor:pointer}
        .verify-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(52,211,153,0.3)}
        .verify-btn:disabled{opacity:0.5;cursor:default;transform:none}
        .verify-loading{text-align:center;padding:2rem;color:var(--text3)}
        .verify-report{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
        .verify-report-header{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
        .verify-provider-info{flex:1}
        .verify-provider-name{font-size:1.4rem;font-weight:600;margin-bottom:0.25rem}
        .verify-provider-detail{font-size:0.85rem;color:var(--text2);margin-bottom:0.1rem}
        .verify-status-badge{padding:0.4rem 0.8rem;border-radius:8px;font-weight:600;font-size:0.85rem;display:inline-block}
        .verify-status-clear{background:rgba(52,211,153,0.15);color:var(--emerald);border:1px solid rgba(52,211,153,0.3)}
        .verify-status-excluded{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
        .verify-section{margin-bottom:1.5rem;padding:1rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm)}
        .verify-section h3{font-size:0.95rem;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem;color:var(--text)}
        .verify-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .verify-row{display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.025);font-size:0.8rem}
        .verify-row:last-child{border-bottom:none}
        .verify-label{color:var(--text3);font-weight:500}
        .verify-value{color:var(--text);text-align:right;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .verify-addresses{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:0.6rem;margin-top:0.5rem}
        .verify-address-card{padding:0.75rem;background:rgba(255,255,255,0.015);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:0.75rem;line-height:1.5;color:var(--text2)}
        .verify-address-type{font-weight:600;color:var(--text);margin-bottom:0.25rem}
        .verify-contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.5rem}
        .verify-contact-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.4rem;background:rgba(255,255,255,0.02);border-radius:var(--radius-xs);border:1px solid var(--border)}
        .verify-contact-icon{color:var(--emerald);font-size:1rem;width:1.2rem;text-align:center;flex-shrink:0;margin-top:0.1rem}
        .verify-contact-label{color:var(--text3);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em}
        .verify-contact-value{color:var(--text);font-size:0.8rem;margin-top:0.15rem;word-break:break-word}
        .verify-contact-link{color:var(--emerald);text-decoration:none;cursor:pointer}
        .verify-contact-link:hover{text-decoration:underline}
        .verify-drug-table{width:100%;border-collapse:collapse;font-size:0.78rem;margin-top:0.5rem}
        .verify-drug-table th{text-align:left;color:var(--text3);font-weight:500;padding:0.3rem 0.5rem;border-bottom:1px solid var(--border2);background:rgba(255,255,255,0.02)}
        .verify-drug-table td{padding:0.3rem 0.5rem;border-bottom:1px solid rgba(255,255,255,0.04)}
        .verify-identifier-chip{display:inline-flex;align-items:center;gap:0.3rem;padding:0.25rem 0.6rem;border-radius:6px;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);font-size:0.75rem;margin:0.15rem}
        .verify-identifier-chip code{font-size:0.7rem;color:var(--emerald)}
        .verify-pub-item{padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
        .verify-pub-item:last-child{border-bottom:none}
        .verify-pub-title{color:var(--text);font-size:0.8rem;line-height:1.4;font-weight:500}
        .verify-pub-meta{color:var(--text3);font-size:0.7rem;margin-top:0.15rem}
        .verify-trial-item{padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.04)}
        .verify-trial-item:last-child{border-bottom:none}
        .verify-trial-title{color:var(--text);font-size:0.8rem;line-height:1.4}
        .verify-trial-status{display:inline-block;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.65rem;font-weight:600;background:rgba(52,211,153,0.15);color:var(--emerald);margin-top:0.3rem}
        .verify-section-count{color:var(--text3);font-size:0.75rem;font-weight:400}
        .verify-tabs{display:flex;gap:0.25rem;margin-bottom:1rem;border-bottom:1px solid var(--border2);padding-bottom:0.5rem;overflow-x:auto}
        .verify-tab{padding:0.3rem 0.8rem;border:none;background:none;color:var(--text3);font-size:0.78rem;cursor:pointer;border-radius:6px;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
        .verify-tab:hover{background:rgba(255,255,255,0.05)}

                    setData(res||[]);
                    setLoading(false);
                });
            },[activeType,search]);

            var types=["providers","drugs","diagnoses","hospitals","clinical_trials"];
            var labels={providers:"Healthcare Providers",drugs:"Medications",diagnoses:"Diagnoses",hospitals:"Hospitals",clinical_trials:"Clinical Trials"};

            return h("div",{className:"browse-view"},
                h("div",{className:"browse-controls"},
                    h("div",{className:"browse-search"},
                        h("input",{
                            placeholder:"Search...",
                            value:search,
                            onChange:function(e){setSearch(e.target.value)}
                        })
                    ),
                    h("div",{className:"browse-tabs"},
                        types.map(function(t){
                            return h("button",{
                                key:t,
                                className:"browse-tab"+(t===activeType?" active":""),
                                onClick:function(){setActiveType(t)}
                            },labels[t]);
                        })
                    )
                ),
                h("div",{className:"browse-content"},
                    loading?h("div",{style:{textAlign:"center",padding:"2rem"}},h("div",{className:"spinner"})):
                    data.length===0?h("div",{className:"browse-no-results"},"No results found"):
                    h("div",null,
                        h("div",{className:"browse-header"},
                            h("h2",null,labels[activeType]+" (",data.length,")"),
                            h("div",{className:"browse-pagination"},"Page ",page)
                        ),
                        h("table",{className:"browse-table"},
                            h("thead",null,h("tr",null,
                                activeType==="providers"?[
                                    h("th",{key:"name"},"Name"),
                                    h("th",{key:"npi"},"NPI"),
                                    h("th",{key:"cred"},"Credential")
                                ]:activeType==="drugs"?[
                                    h("th",{key:"name"},"Name"),
                                    h("th",{key:"rxcui"},"RxCUI")
                                ]:[
                                    h("th",{key:"name"},"Name/Title")
                                ]
                            )),
                            h("tbody",null,
                                data.slice(0,20).map(function(item,i){
                                    return h("tr",{key:i},
                                        activeType==="providers"?[
                                            h("td",{key:"name"},
                                                h("span",{className:"browse-table-link",onClick:function(){props.navigate("entity",{entityType:"provider",entityId:item.npi})}},
                                                    (item.first_name||"")+" "+(item.last_name||item.organization_name||"")
                                                )
                                            ),
                                            h("td",{key:"npi"},h("code",{style:{fontSize:"0.75rem"}},item.npi)),
                                            h("td",{key:"cred"},item.credential||"—")
                                        ]:activeType==="drugs"?[
                                            h("td",{key:"name"},item.name),
                                            h("td",{key:"rxcui"},h("code",{style:{fontSize:"0.75rem"}},item.rxcui))
                                        ]:[
                                            h("td",{key:"name"},item.title||item.name||item.official_title||"—")
                                        ]
                                    );
                                })
                            )
                        )
                    )
                )
            );
        }

        // === GRAPH VIEW (D3.JS via CDN) ===
        function GraphView(props){
            var canvasRef=useRef(null);
            var detailRef=useRef(null);
            var _n=useState(null),selectedNode=_n[0],setSelectedNode=_n[1];

            useEffect(function(){
                var canvas=canvasRef.current;
                if(!canvas)return;

                var width=canvas.clientWidth,height=canvas.clientHeight;
                var svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
                svg.setAttribute("width",width);
                svg.setAttribute("height",height);
                svg.style.background="transparent";
                canvas.innerHTML="";
                canvas.appendChild(svg);

                // Sample nodes & links
                var nodes=[
                    {id:1,name:"Dr. Jane Smith",type:"provider",rx:Math.random()*width,ry:Math.random()*height},
                    {id:2,name:"Lisinopril",type:"drug",rx:Math.random()*width,ry:Math.random()*height},
                    {id:3,name:"Hypertension",type:"diagnosis",rx:Math.random()*width,ry:Math.random()*height},
                    {id:4,name:"Mount Sinai Hospital",type:"hospital",rx:Math.random()*width,ry:Math.random()*height},
                ];
                var links=[
                    {source:0,target:1,label:"prescribes"},
                    {source:0,target:2,label:"treats"},
                    {source:1,target:2,label:"for"},
                    {source:0,target:3,label:"practices"}
                ];

                // Draw links
                links.forEach(function(link){
                    var x1=nodes[link.source].rx,y1=nodes[link.source].ry;
                    var x2=nodes[link.target].rx,y2=nodes[link.target].ry;
                    var line=document.createElementNS("http://www.w3.org/2000/svg","line");
                    line.setAttribute("x1",x1);line.setAttribute("y1",y1);
                    line.setAttribute("x2",x2);line.setAttribute("y2",y2);
                    line.setAttribute("stroke","rgba(52,211,153,0.2)");
                    line.setAttribute("stroke-width","1");
                    svg.appendChild(line);
                });

                // Draw nodes
                var colors={provider:"#34D399",drug:"#10B981",diagnosis:"#A78BFA",hospital:"#22D3EE"};
                nodes.forEach(function(node){
                    var circle=document.createElementNS("http://www.w3.org/2000/svg","circle");
                    circle.setAttribute("cx",node.rx);circle.setAttribute("cy",node.ry);
                    circle.setAttribute("r","12");circle.setAttribute("fill",colors[node.type]);
                    circle.style.cursor="pointer";
                    circle.onclick=function(){setSelectedNode(node)};
                    svg.appendChild(circle);
                    var text=document.createElementNS("http://www.w3.org/2000/svg","text");
                    text.setAttribute("x",node.rx);text.setAttribute("y",node.ry+25);
                    text.setAttribute("text-anchor","middle");text.setAttribute("font-size","11");
                    text.setAttribute("fill","#eef0f6");text.textContent=node.name;
                    svg.appendChild(text);
                });
            },[]);

            return h("div",{className:"graph-view"},
                h("div",{ref:canvasRef,className:"graph-canvas"}),
                selectedNode?h("div",{ref:detailRef,className:"graph-detail open"},
                    h("div",{className:"graph-detail-close",onClick:function(){setSelectedNode(null)}},"✕"),
                    h("h3",null,selectedNode.name),
                    h("p",null,"Type: ",h("strong",null,selectedNode.type.charAt(0).toUpperCase()+selectedNode.type.slice(1))),
                    h("div",{className:"graph-detail-section"},
                        h("h4",null,"Relationships"),
                        h("div",{className:"graph-detail-link"},
                            h("span",{className:"graph-detail-label"},"Connected to 3 entities"),
                            h("span",{className:"graph-detail-relation"},"→")
                        )
                    )
                ):null,
                h("div",{className:"graph-legend"},
                    h("div",{className:"graph-legend-item"},h("div",{className:"graph-legend-dot",style:{background:"#34D399"}}),h("span",null,"Provider")),
                    h("div",{className:"graph-legend-item"},h("div",{className:"graph-legend-dot",style:{background:"#10B981"}}),h("span",null,"Drug")),
                    h("div",{className:"graph-legend-item"},h("div",{className:"graph-legend-dot",style:{background:"#A78BFA"}}),h("span",null,"Diagnosis")),
                    h("div",{className:"graph-legend-item"},h("div",{className:"graph-legend-dot",style:{background:"#22D3EE"}}),h("span",null,"Hospital"))
                )
            );
        }

        // === MAIN APP ===
        function App(){
            var _v=useState("home"),view=_v[0],setView=_v[1];
            var _e=useState(null),entityData=_e[0],setEntityData=_e[1];
            var _b=useState("providers"),browseType=_b[0],setBrowseType=_b[1];

            function navigate(nextView,data){
                if(nextView==="entity"){
                    setEntityData(data);
                    setView("entity");
                }else if(nextView==="browse"){
                    setBrowseType(data);
                    setView("browse");
                }else{
                    setView(nextView);
                }
            }

            function onSelectEntity(item){
                navigate("entity",{entityType:item.type,entityId:item.id});
            }

            return h("div",{className:"app"},
                h("div",{className:"topbar"},
                    h("div",{className:"topbar-logo"},
                        h("img",{src:"https://xkafbsrjwzywqbuqzqks.supabase.co/storage/v1/object/public/knowledge-gardens/hkg/hkg-hexagon-logo.png?t=2026-04-12T12-34-56Z"})
                    ),
                    h("div",{className:"topbar-brand"},
                        "Health ",h("span",null,"Knowledge")," Garden"
                    ),
                    h("div",{className:"spacer"}),
                    h("div",{className:"topbar-stat"},
                        h("span",{className:"live-dot"}),
                        h("strong",null,"LIVE"),
                        h("span",null,"12.1M records")
                    ),
                    h("div",{className:"nav-pills"},
                        h("button",{className:"nav-pill"+(view==="home"?" active":""),onClick:function(){setView("home")}},"Home"),
                        h("button",{className:"nav-pill"+(view==="verify"?" active":""),onClick:function(){setView("verify")}},"Verify"),
                        h("button",{className:"nav-pill"+(view==="interactions"?" active":""),onClick:function(){setView("interactions")}},"Interactions"),
                        h("button",{className:"nav-pill"+(view==="browse"?" active":""),onClick:function(){setView("browse")}},"Browse"),
                        h("button",{className:"nav-pill"+(view==="graph"?" active":""),onClick:function(){setView("graph")}},"Graph")
                    )
                ),
                h("div",{className:"main"},
                    view==="home"?h(HomeView,{navigate:navigate,onSelectEntity:onSelectEntity}):
                    view==="verify"?h(VerifyView,{navigate:navigate}):
                    view==="interactions"?h(InteractionView,{navigate:navigate}):
                    view==="browse"?h(BrowseView,{navigate:navigate,browseType:browseType}):
                    view==="entity"?h(EntityView,{navigate:navigate,entityType:entityData.entityType,entityId:entityData.entityId}):
                    view==="graph"?h(GraphView,{navigate:navigate}):
                    null
                )
            );
        }

        // === INIT ===
        ReactDOM.render(h(App),document.getElementById("root"));
        initCanvas();
    </script>
</body>
</html>
