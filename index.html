  const url = `${SUPABASE_URL}/${table}?${params}`;
  const h = {
    ...headers
  };
  if (opts.count) h["Prefer"] = "count=exact";
  if (opts.head) {
    const res = await fetch(url, {
      method: "HEAD",
      headers: h
    });
    const range = res.headers.get("content-range");
    return range ? parseInt(range.split("/")[1]) || 0 : 0;
  }
  const res = await fetch(url, {
    headers: h
  });
  return res.json();
}
