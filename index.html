        /* Lanes View */
        .lanes-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            overflow-y: auto;
            background: linear-gradient(135deg, #06060B 0%, #0f0f1a 100%);
        }

        .lanes-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideUp 0.6s cubic-bezier(.22,1,.36,1);
        }

        .lanes-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            animation: fadeIn 0.6s ease;
        }

        .lanes-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #34D399 0%, #22D3EE 50%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lanes-subtitle {
            font-size: 1.1rem;
            color: #888;
            font-weight: 300;
        }

        .lanes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 3rem;

            animation: slideUp 0.6s cubic-bezier(.22,1,.36,1);
            animation-fill-mode: both;

        .lane-card:nth-child(1) { animation-delay: 0.1s; }
        .lane-card:nth-child(2) { animation-delay: 0.2s; }
        .lane-card:nth-child(3) { animation-delay: 0.3s; }
        .lane-card:nth-child(4) { animation-delay: 0.4s; }

        .stats-footer {

            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

        .stat-item {

        .stat-number {
            font-size: 1.3rem;

            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: #888;
            font-size: 0.85rem;
        }

        .stat-number.provider { color: #34D399; }
        .stat-number.drug { color: #F97316; }
        .stat-number.diagnosis { color: #EF4444; }
        .stat-number.trial { color: #D4A853; }
        .stat-number.code { color: #22D3EE; }

        .loading {
            display: flex;

        .loading-dot {
            width: 8px;

            animation: pulse 1.5s ease-in-out infinite;

        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .lanes-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;

            .lanes-title {

            .app-topbar {
                flex-wrap: wrap;
                padding: 0.75rem 1rem;

            .topbar-title {

            .search-section {
                padding: 1rem;

            .explanation-card {

            .stats-footer {
                padding: 1rem;
                gap: 0.5rem;

            .stat-number {
                font-size: 1.1rem;

            .stat-label {
                font-size: 0.75rem;

        }

<body>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    <script>
        const SUPABASE_URL = "https://opbrzaegvfyjpyyrmdfe.supabase.co/rest/v1";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wYnJ6YWVndmZ5anB5eXJtZGZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTgxODUsImV4cCI6MjA5MTI5NDE4NX0.zDAsWg36H0CCTO2wv7HAablyuYkqThAYGX23qcz7uKE";

        const headers = {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`
        };

        const lanes = {
            clinician: {
                id: 'clinician',
                icon: '🏥',
                title: 'Clinician',
                subtitle: 'I treat patients',
                description: 'Provider lookup, drug references, diagnosis codes, clinical trials',
                color: '#34D399',
                colorName: 'clinician'
            },
            patient: {
                id: 'patient',
                icon: '💚',
                title: 'Patient / Caregiver',
                subtitle: 'I want to understand my health',
                description: 'Plain-language explanations, find providers, understand medications',
                color: '#A78BFA',
                colorName: 'patient'
            },
            operations: {
                id: 'operations',
                icon: '⚙️',
                title: 'Operations',
                subtitle: 'I manage healthcare systems',
                description: 'Compliance checks, billing codes, exclusion screening, analytics',
                color: '#22D3EE',
                colorName: 'operations'
            },
            explorer: {
                id: 'explorer',
                icon: '🔍',
                title: 'Explorer',
                subtitle: 'I\'m curious about healthcare data',
                description: 'Browse the full knowledge graph, search everything',
                color: '#D4A853',
                colorName: 'explorer'
            }
        };

        // Fetch entity counts from Supabase
        async function fetchEntityCounts() {
            const tables = [
                'providers', 'drugs', 'icd10_cm_codes', 'ndc_codes',
                'clinical_trials', 'oig_exclusions', 'pubmed_citations',
                'hcpcs_codes', 'icd10_pcs_codes', 'provider_taxonomies'
            ];

            const counts = {};
            const results = await Promise.all(tables.map(table =>
                fetch(`${SUPABASE_URL}/${table}?select=id&limit=1`, {
                    method: 'HEAD',
                    headers: { ...headers, Prefer: 'count=exact' }
                }).then(r => {
                    const range = r.headers.get('content-range');
                    return { table, count: range ? parseInt(range.split('/')[1] || '0', 10) : 0 };
                }).catch(() => ({ table, count: 0 }))
            ));
            let totalCount = 0;
            results.forEach(r => { counts[r.table] = r.count; totalCount += r.count; });

            return { totalCount, counts };
        }

        // Graph data structure and force simulation
        class ForceGraph {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.nodes = [];
                this.edges = [];
                this.simulation = null;
                this.alpha = 1;
                this.padding = 60;
            }

            addNode(id, label, type, data = {}) {
                if (!this.nodes.find(n => n.id === id)) {
                    this.nodes.push({
                        id,
                        label,
                        type,
                        x: Math.random() * (this.width - this.padding * 2) + this.padding,
                        y: Math.random() * (this.height - this.padding * 2) + this.padding,
                        vx: 0,
                        vy: 0,
                        data
                    });
                }
            }

            addEdge(source, target, label = '') {
                if (this.nodes.find(n => n.id === source) && this.nodes.find(n => n.id === target)) {
                    if (!this.edges.find(e => (e.source === source && e.target === target) || (e.source === target && e.target === source))) {
                        this.edges.push({ source, target, label });
                    }
                }
            }

            tick() {
                const k = 0.5;
                const strength = -30;
                const distance = 80;
                const damping = 0.9;
                const minAlpha = 0.001;

                // Apply forces
                for (let i = 0; i < this.nodes.length; i++) {
                    for (let j = i + 1; j < this.nodes.length; j++) {
                        const a = this.nodes[i];
                        const b = this.nodes[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        const force = strength / (dist * dist);

                        a.vx += (force * dx) / dist;
                        a.vy += (force * dy) / dist;
                        b.vx -= (force * dx) / dist;
                        b.vy -= (force * dy) / dist;
                    }
                }

                // Link forces
                for (const edge of this.edges) {
                    const a = this.nodes.find(n => n.id === edge.source);
                    const b = this.nodes.find(n => n.id === edge.target);
                    if (a && b) {
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        const force = k * (dist - distance);

                        a.vx += (force * dx) / dist;
                        a.vy += (force * dy) / dist;
                        b.vx -= (force * dx) / dist;
                        b.vy -= (force * dy) / dist;
                    }
                }

                // Apply damping and update positions
                let maxVel = 0;
                for (const node of this.nodes) {
                    node.vx *= damping;
                    node.vy *= damping;
                    node.x += node.vx;
                    node.y += node.vy;

                    // Contain within bounds
                    node.x = Math.max(this.padding, Math.min(this.width - this.padding, node.x));
                    node.y = Math.max(this.padding, Math.min(this.height - this.padding, node.y));

                    const vel = Math.sqrt(node.vx * node.vx + node.vy * node.vy);
                    maxVel = Math.max(maxVel, vel);
                }

                this.alpha = Math.max(minAlpha, this.alpha * 0.99);
                return this.alpha > minAlpha || maxVel > 0.1;
            }

            render(ctx, hoveredNodeId = null) {
                ctx.fillStyle = '#06060B';
                ctx.fillRect(0, 0, this.width, this.height);

                // Draw edges
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1.5;
                for (const edge of this.edges) {
                    const source = this.nodes.find(n => n.id === edge.source);
                    const target = this.nodes.find(n => n.id === edge.target);
                    if (source && target) {
                        ctx.beginPath();
                        ctx.moveTo(source.x, source.y);
                        ctx.lineTo(target.x, target.y);
                        ctx.stroke();

                        // Draw edge label
                        if (edge.label) {
                            const mx = (source.x + target.x) / 2;
                            const my = (source.y + target.y) / 2;
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                            ctx.font = '11px "DM Sans"';
                            ctx.textAlign = 'center';
                            ctx.fillText(edge.label, mx, my - 5);
                        }
                    }
                }

                // Draw nodes
                for (const node of this.nodes) {
                    const radius = 25;
                    const isHovered = node.id === hoveredNodeId;

                    // Node background
                    ctx.fillStyle = this.getNodeColor(node.type);
                    if (isHovered) {
                        ctx.fillStyle = this.adjustBrightness(ctx.fillStyle, 1.3);
                    }

                    // Draw rounded rect for node
                    ctx.beginPath();
                    ctx.roundRect(node.x - radius, node.y - radius / 1.5, radius * 2, radius, 8);
                    ctx.fill();

                    // Node border
                    if (isHovered) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.lineWidth = 2;
                    } else {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.lineWidth = 1;
                    }
                    ctx.stroke();

                    // Node label
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 12px "DM Sans"';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    const lines = this.wrapText(node.label, 18);
                    const lineHeight = 13;
                    const totalHeight = (lines.length - 1) * lineHeight;
                    const startY = node.y - totalHeight / 2;

                    for (let i = 0; i < lines.length; i++) {
                        ctx.fillText(lines[i], node.x, startY + i * lineHeight);
                    }
                }
            }

            getNodeColor(type) {
                const colors = {
                    provider: '#34D399',
                    drug: '#F97316',
                    diagnosis: '#EF4444',
                    trial: '#D4A853',
                    code: '#22D3EE',
                    taxonomy: '#A78BFA',
                    manufacturer: '#8B5CF6'
                };
                return colors[type] || '#34D399';
            }

            adjustBrightness(color, factor) {
                const hex = color.replace('#', '');
                const r = Math.min(255, Math.floor(parseInt(hex.substr(0, 2), 16) * factor));
                const g = Math.min(255, Math.floor(parseInt(hex.substr(2, 2), 16) * factor));
                const b = Math.min(255, Math.floor(parseInt(hex.substr(4, 2), 16) * factor));
                return `rgb(${r}, ${g}, ${b})`;
            }

            wrapText(text, maxChars) {
                if (text.length <= maxChars) return [text];
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                for (const word of words) {
                    if ((currentLine + word).length > maxChars) {
                        if (currentLine) lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine += (currentLine ? ' ' : '') + word;
                    }
                }
                if (currentLine) lines.push(currentLine);
                return lines;
            }

            getNodeAtPoint(x, y) {
                for (const node of this.nodes) {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    if (Math.sqrt(dx * dx + dy * dy) < 35) {
                        return node;
                    }
                }
                return null;
            }
        }

        // React Components
        const LanesScreen = ({ onSelectLane, stats }) => {
            return React.createElement('div', { className: 'lanes-container' },
                React.createElement('div', { className: 'lanes-header' },
                    React.createElement('img', {
                        className: 'lanes-logo',
                        src: 'assets/logo-transparent.png',
                        alt: 'Health Knowledge Garden'
                    }),
                    React.createElement('h1', { className: 'lanes-title' }, 'Health Knowledge Garden'),
                    React.createElement('p', { className: 'lanes-subtitle' }, 'How can we help you today?')
                ),
                React.createElement('div', { className: 'lanes-grid' },
                    Object.values(lanes).map(lane =>
                        React.createElement('div', {
                            key: lane.id,
                            className: `lane-card ${lane.colorName}`,
                            onClick: () => onSelectLane(lane.id)
                        },
                            React.createElement('div', { className: 'lane-icon' }, lane.icon),
                            React.createElement('h2', null, lane.title),
                            React.createElement('p', { style: { fontSize: '0.85rem', marginBottom: '0.5rem' } }, lane.subtitle),
                            React.createElement('p', { style: { fontSize: '0.9rem', color: '#999' } }, lane.description)
                        )
                    )
                ),
                React.createElement('div', { className: 'lanes-stats' },
                    React.createElement('span', null,
                        React.createElement('strong', null, stats.totalCount.toLocaleString()),
                        ' entities across 10 federal sources'
                    )
                )
            );
        };

        const AppScreen = ({ currentLane, onSwitchLane, stats }) => {
            const [searchQuery, setSearchQuery] = React.useState('');
            const [searchResults, setSearchResults] = React.useState([]);
            const [showDropdown, setShowDropdown] = React.useState(false);
            const [hoveredNode, setHoveredNode] = React.useState(null);
            const [tooltip, setTooltip] = React.useState(null);
            const canvasRef = React.useRef(null);
            const graphRef = React.useRef(null);
            const animationRef = React.useRef(null);

            const lane = lanes[currentLane];

            const searchPlaceholders = {
                clinician: 'Search providers, drugs, ICD-10 codes...',
                patient: 'Search conditions, medications, doctors...',
                operations: 'Search HCPCS, OIG exclusions, NDC codes...',
                explorer: 'Search anything across 1.1M records...'
            };

            const explanations = {
                clinician: 'Clinician view: See provider networks, their specialties, common diagnoses they treat, and relevant medications with active clinical trials.',
                patient: 'Patient view: Discover what a diagnosis means, medications used to treat it, specialists who can help, and research opportunities.',
                operations: 'Operations view: Verify provider credentials and exclusion status, audit billing code usage, and track compliance across your network.',
                explorer: 'Explorer view: Navigate the complete healthcare knowledge graph with 1.1M verified entities from 10 federal sources.',
            };

            // Initialize graph
            React.useEffect(() => {
                if (!canvasRef.current || graphRef.current) return;

                const canvas = canvasRef.current;
                const parent = canvas.parentElement;
                const w = parent ? parent.clientWidth : window.innerWidth;
                const h = parent ? parent.clientHeight : 500;
                canvas.width = w || 800;
                canvas.height = h || 500;

                const graph = new ForceGraph(canvas.width, canvas.height);
                graphRef.current = graph;

                // Load initial data based on lane
                loadGraphData(currentLane, graph);

                // Animation loop — always render, tick for physics
                const ctx = canvas.getContext('2d');
                const animate = () => {
                    graph.tick();
                    graph.render(ctx, null);
                    animationRef.current = requestAnimationFrame(animate);
                };
                animate();

                // Handle canvas interactions
                const handleMouseMove = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const node = graph.getNodeAtPoint(x, y);
                    setHoveredNode(node?.id || null);
                    if (node) {
                        setTooltip({
                            x: e.clientX,
                            y: e.clientY,
                            node
                        });
                    } else {
                        setTooltip(null);
                    }
                };

                const handleClick = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const node = graph.getNodeAtPoint(x, y);
                    if (node) {
                        expandNode(node, graph);
                    }
                };

                let isPanning = false;
                let panStart = { x: 0, y: 0 };

                const handleMouseDown = (e) => {
                    isPanning = true;
                    panStart = { x: e.clientX, y: e.clientY };
                };

                const handleMouseUp = () => {
                    isPanning = false;
                };

                const handleMouseDrag = (e) => {
                    if (!isPanning) return;
                    const dx = e.clientX - panStart.x;
                    const dy = e.clientY - panStart.y;
                    for (const node of graph.nodes) {
                        node.x += dx;
                        node.y += dy;
                    }
                    panStart = { x: e.clientX, y: e.clientY };
                };

                const handleWheel = (e) => {
                    e.preventDefault();
                    const zoomFactor = e.deltaY > 0 ? 0.95 : 1.05;
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    for (const node of graph.nodes) {
                        const dx = node.x - centerX;
                        const dy = node.y - centerY;
                        node.x = centerX + dx * zoomFactor;
                        node.y = centerY + dy * zoomFactor;
                    }
                };

                canvas.addEventListener('mousemove', handleMouseMove);
                canvas.addEventListener('click', handleClick);
                canvas.addEventListener('mousedown', handleMouseDown);
                canvas.addEventListener('mouseup', handleMouseUp);
                canvas.addEventListener('mousemove', handleMouseDrag);
                canvas.addEventListener('wheel', handleWheel, { passive: false });

                return () => {
                    cancelAnimationFrame(animationRef.current);
                    canvas.removeEventListener('mousemove', handleMouseMove);
                    canvas.removeEventListener('click', handleClick);
                    canvas.removeEventListener('mousedown', handleMouseDown);
                    canvas.removeEventListener('mouseup', handleMouseUp);
                    canvas.removeEventListener('mousemove', handleMouseDrag);
                    canvas.removeEventListener('wheel', handleWheel);
                };
            }, [currentLane, hoveredNode]);

            const loadGraphData = async (lane, graph) => {
                try {
                    if (lane === 'clinician') {
                        // Fetch a provider with M.D. credential
                        const providers = await fetch(
                            `${SUPABASE_URL}/providers?credential=ilike.%25M.D.%25&limit=1&select=id,first_name,last_name,credential`,
                            { headers }
                        ).then(r => r.json());

                        if (providers.length > 0) {
                            const provider = providers[0];
                            const providerId = `provider-${provider.id}`;
                            graph.addNode(providerId, `${provider.first_name} ${provider.last_name}`, 'provider', provider);

                            // Fetch provider taxonomies
                            const taxonomies = await fetch(
                                `${SUPABASE_URL}/provider_taxonomies?provider_id=eq.${provider.id}&limit=3&select=id,taxonomy_code,taxonomy_description,license_state,is_primary`,
                                { headers }
                            ).then(r => r.json());

                            for (const tax of taxonomies) {
                                const taxId = `taxonomy-${tax.id}`;
                                var taxLabel = tax.taxonomy_description || ('Taxonomy ' + tax.taxonomy_code);
                                if (tax.license_state) taxLabel += ' (' + tax.license_state + ')';
                                graph.addNode(taxId, taxLabel, 'taxonomy', tax);
                                graph.addEdge(providerId, taxId, 'specializes');
                            }

                            // Add common diagnoses
                            const diagnosisCodes = ['E119', 'I10', 'J449', 'M545'];
                            const diagnoses = await Promise.all(
                                diagnosisCodes.map(code =>
                                    fetch(`${SUPABASE_URL}/icd10_cm_codes?code=eq.${code}&select=id,code,description`, { headers })
                                        .then(r => r.json())
                                        .then(res => res[0])
                                        .catch(() => null)
                                )
                            );

                            for (const dx of diagnoses.filter(d => d)) {
                                const dxId = `diagnosis-${dx.id}`;
                                graph.addNode(dxId, `${dx.code}: ${dx.description.substring(0, 30)}`, 'diagnosis', dx);
                                graph.addEdge(providerId, dxId, 'treats');
                            }

                            // Add drugs
                            const drugs = await fetch(
                                `${SUPABASE_URL}/drugs?name=ilike.%25metformin%25&limit=2&select=id,name,drug_class`,
                                { headers }
                            ).then(r => r.json());

                            for (const drug of drugs) {
                                const drugId = `drug-${drug.id}`;
                                graph.addNode(drugId, drug.name, 'drug', drug);
                                graph.addEdge(providerId, drugId, 'prescribes');
                            }

                            // Add clinical trials
                            const trials = await fetch(
                                `${SUPABASE_URL}/clinical_trials?status=ilike.%25active%25&limit=2&select=id,title`,
                                { headers }
                            ).then(r => r.json());

                            for (const trial of trials) {
                                const trialId = `trial-${trial.id}`;
                                graph.addNode(trialId, trial.title.substring(0, 35), 'trial', trial);
                                graph.addEdge(providerId, trialId, 'enrolls');
                            }
                        }
                    } else if (lane === 'patient') {
                        // Center on Type 2 Diabetes diagnosis
                        graph.addNode('dx-e119', 'Type 2 Diabetes (E11.9)', 'diagnosis', { code: 'E119' });

                        // Related drugs
                        const drugs = await fetch(
                            `${SUPABASE_URL}/drugs?or=(name.ilike.%25metformin%25,name.ilike.%25lisinopril%25)&limit=3&select=id,name`,
                            { headers }
                        ).then(r => r.json());

                        for (const drug of drugs) {
                            const drugId = `drug-${drug.id}`;
                            graph.addNode(drugId, drug.name, 'drug', drug);
                            graph.addEdge('dx-e119', drugId, 'treated with');
                        }

                        // Specialist providers
                        const providers = await fetch(
                            `${SUPABASE_URL}/providers?credential=ilike.%25M.D.%25&limit=3&select=id,first_name,last_name`,
                            { headers }
                        ).then(r => r.json());

                        for (const provider of providers) {
                            const providerId = `provider-${provider.id}`;
                            graph.addNode(providerId, `Dr. ${provider.last_name}`, 'provider', provider);
                            graph.addEdge('dx-e119', providerId, 'consult');
                        }

                        // Clinical trials
                        const trials = await fetch(
                            `${SUPABASE_URL}/clinical_trials?limit=2&select=id,title`,
                            { headers }
                        ).then(r => r.json());

                        for (const trial of trials) {
                            const trialId = `trial-${trial.id}`;
                            graph.addNode(trialId, trial.title.substring(0, 35), 'trial', trial);
                            graph.addEdge('dx-e119', trialId, 'research');
                        }
                    } else if (lane === 'operations') {
                        graph.addNode('compliance', 'Compliance Hub', 'code', {});

                        // OIG exclusions
                        const exclusions = await fetch(
                            `${SUPABASE_URL}/oig_exclusions?limit=3&select=id,entity_name`,
                            { headers }
                        ).then(r => r.json());

                        for (const excl of exclusions) {
                            const exclId = `exclusion-${excl.id}`;
                            graph.addNode(exclId, excl.entity_name, 'code', excl);
                            graph.addEdge('compliance', exclId, 'excluded');
                        }

                        // HCPCS codes
                        const hcpcs = await fetch(
                            `${SUPABASE_URL}/hcpcs_codes?limit=3&select=id`,
                            { headers }
                        ).then(r => r.json());

                        for (let i = 0; i < hcpcs.length; i++) {
                            graph.addNode(`hcpcs-${i}`, `HCPCS Code ${i + 1}`, 'code', hcpcs[i]);
                            graph.addEdge('compliance', `hcpcs-${i}`, 'codes');
                        }

                        // Providers
                        const providers = await fetch(
                            `${SUPABASE_URL}/providers?limit=2&select=id,first_name,last_name`,
                            { headers }
                        ).then(r => r.json());

                        for (const provider of providers) {
                            const providerId = `provider-${provider.id}`;
                            graph.addNode(providerId, `${provider.first_name} ${provider.last_name}`, 'provider', provider);
                            graph.addEdge('compliance', providerId, 'monitors');
                        }
                    } else if (lane === 'explorer') {
                        // Multi-hub explorer view
                        const hubs = ['Providers', 'Drugs', 'Diagnoses', 'Trials', 'Codes'];
                        for (const hub of hubs) {
                            graph.addNode(`hub-${hub.toLowerCase()}`, hub, 'code', {});
                        }

                        // Sample data from each category
                        const providers = await fetch(
                            `${SUPABASE_URL}/providers?limit=2&select=id,first_name,last_name`,
                            { headers }
                        ).then(r => r.json());
                        for (const p of providers) {
                            const id = `provider-${p.id}`;
                            graph.addNode(id, p.last_name, 'provider', p);
                            graph.addEdge(`hub-providers`, id, 'includes');
                        }

                        const drugs = await fetch(
                            `${SUPABASE_URL}/drugs?limit=2&select=id,name`,
                            { headers }
                        ).then(r => r.json());
                        for (const d of drugs) {
                            const id = `drug-${d.id}`;
                            graph.addNode(id, d.name, 'drug', d);
                            graph.addEdge(`hub-drugs`, id, 'includes');
                        }

                        const diagnoses = await fetch(
                            `${SUPABASE_URL}/icd10_cm_codes?limit=2&select=id,code,description`,
                            { headers }
                        ).then(r => r.json());
                        for (const dx of diagnoses) {
                            const id = `diagnosis-${dx.id}`;
                            graph.addNode(id, dx.code, 'diagnosis', dx);
                            graph.addEdge(`hub-diagnoses`, id, 'includes');
                        }

                        const trials = await fetch(
                            `${SUPABASE_URL}/clinical_trials?limit=2&select=id,title`,
                            { headers }
                        ).then(r => r.json());
                        for (const t of trials) {
                            const id = `trial-${t.id}`;
                            graph.addNode(id, t.title.substring(0, 25), 'trial', t);
                            graph.addEdge(`hub-trials`, id, 'includes');
                        }

                        const codes = await fetch(
                            `${SUPABASE_URL}/hcpcs_codes?limit=2&select=id`,
                            { headers }
                        ).then(r => r.json());
                        for (let i = 0; i < codes.length; i++) {
                            graph.addNode(`code-${i}`, `Code ${i + 1}`, 'code', codes[i]);
                            graph.addEdge(`hub-codes`, `code-${i}`, 'includes');
                        }
                    }
                } catch (e) {
                    console.warn('Failed to load graph data:', e);
                }
            };

            const expandNode = async (node, graph) => {
                if (node.type === 'provider' && node.data.id) {
                    // Fetch and add taxonomies
                    const taxes = await fetch(
                        `${SUPABASE_URL}/provider_taxonomies?provider_id=eq.${node.data.id}&limit=2&select=id,taxonomy_description`,
                        { headers }
                    ).then(r => r.json()).catch(() => []);

                    for (const tax of taxes) {
                        const taxId = `taxonomy-${tax.id}`;
                        graph.addNode(taxId, tax.taxonomy_description, 'taxonomy', tax);
                        graph.addEdge(node.id, taxId, 'has');
                    }
                } else if (node.type === 'drug' && node.data.id) {
                    // Fetch similar drugs
                    const similar = await fetch(
                        `${SUPABASE_URL}/drugs?drug_class=eq.${node.data.drug_class}&limit=2&select=id,name`,
                        { headers }
                    ).then(r => r.json()).catch(() => []);

                    for (const drug of similar) {
                        const drugId = `drug-${drug.id}`;
                        graph.addNode(drugId, drug.name, 'drug', drug);
                        graph.addEdge(node.id, drugId, 'similar');
                    }
                } else if (node.type === 'diagnosis' && node.data.id) {
                    // Fetch related diagnoses
                    const code = node.data.code?.substring(0, 3) || '';
                    const related = await fetch(
                        `${SUPABASE_URL}/icd10_cm_codes?code=ilike.${code}%&limit=2&select=id,code,description`,
                        { headers }
                    ).then(r => r.json()).catch(() => []);

                    for (const dx of related) {
                        const dxId = `diagnosis-${dx.id}`;
                        graph.addNode(dxId, `${dx.code}: ${dx.description.substring(0, 20)}`, 'diagnosis', dx);
                        graph.addEdge(node.id, dxId, 'related');
                    }
                }
            };

            const handleSearch = async (query) => {
                setSearchQuery(query);
                if (query.length < 2) {
                    setSearchResults([]);
                    setShowDropdown(false);
                    return;
                }

                const results = [];
                const searchTerm = `ilike.%25${encodeURIComponent(query)}%25`;

                try {
                    // Search across multiple tables based on lane
                    if (['clinician', 'explorer'].includes(currentLane)) {
                        const providers = await fetch(
                            `${SUPABASE_URL}/providers?or=(first_name.${searchTerm},last_name.${searchTerm})&limit=3&select=id,first_name,last_name,credential`,
                            { headers }
                        ).then(r => r.json()).catch(() => []);
                        for (const p of providers) {
                            results.push({
                                id: `provider-${p.id}`,
                                name: `${p.first_name} ${p.last_name}`,
                                type: 'provider',
                                detail: p.credential
                            });
                        }
                    }

                    const drugs = await fetch(
                        `${SUPABASE_URL}/drugs?name.${searchTerm}&limit=3&select=id,name,drug_class`,
                        { headers }
                    ).then(r => r.json()).catch(() => []);
                    for (const d of drugs) {
                        results.push({
                            id: `drug-${d.id}`,
                            name: d.name,
                            type: 'drug',
                            detail: d.drug_class
                        });
                    }

                    const diagnoses = await fetch(
                        `${SUPABASE_URL}/icd10_cm_codes?or=(code.${searchTerm},description.${searchTerm})&limit=3&select=id,code,description`,
                        { headers }
                    ).then(r => r.json()).catch(() => []);
                    for (const dx of diagnoses) {
                        results.push({
                            id: `diagnosis-${dx.id}`,
                            name: `${dx.code}`,
                            type: 'diagnosis',
                            detail: dx.description
                        });
                    }

                    if (['clinician', 'explorer'].includes(currentLane)) {
                        const trials = await fetch(
                            `${SUPABASE_URL}/clinical_trials?title.${searchTerm}&limit=3&select=id,title,status`,
                            { headers }
                        ).then(r => r.json()).catch(() => []);
                        for (const t of trials) {
                            results.push({
                                id: `trial-${t.id}`,
                                name: t.title,
                                type: 'trial',
                                detail: t.status
                            });
                        }
                    }
                } catch (e) {
                    console.warn('Search error:', e);
                }

                setSearchResults(results.slice(0, 8));
                setShowDropdown(true);
            };

            return React.createElement('div', { className: 'app-container' },
                React.createElement('div', { className: 'app-topbar' },
                    React.createElement('div', { className: 'topbar-left' },
                        React.createElement('img', {
                            className: 'topbar-logo',
                            src: 'assets/logo-transparent.png',
                            alt: 'HKG'
                        }),
                        React.createElement('div', { className: 'topbar-title' }, 'Health Knowledge Garden')
                    ),
                    React.createElement('div', { className: `lane-pill ${lane.colorName}` }, `🏷️ ${lane.title}`),
                    React.createElement('button', {
                        className: 'switch-lane-btn',
                        onClick: onSwitchLane
                    }, 'Switch lane')
                ),
                React.createElement('div', { className: 'app-content' },
                    React.createElement('div', { className: 'search-section' },
                        React.createElement('div', { className: 'search-wrapper' },
                            React.createElement('input', {
                                type: 'text',
                                className: 'search-input',
                                placeholder: searchPlaceholders[currentLane],
                                value: searchQuery,
                                onChange: (e) => handleSearch(e.target.value),
                                onFocus: () => searchQuery.length >= 2 && setShowDropdown(true),
                                onBlur: () => setTimeout(() => setShowDropdown(false), 100)
                            }),
                            React.createElement('div', { className: `search-dropdown ${showDropdown ? 'active' : ''}` },
                                searchResults.map((result, idx) =>
                                    React.createElement('div', {
                                        key: idx,
                                        className: 'search-result',
                                        onClick: () => {
                                            setSearchQuery('');
                                            setShowDropdown(false);
                                        }
                                    },
                                        React.createElement('div', { className: 'search-result-name' },
                                            result.name,
                                            React.createElement('span', { className: `result-badge ${result.type}` }, result.type)
                                        ),
                                        React.createElement('div', { className: 'search-result-detail' }, result.detail)
                                    )
                                )
                            )
                        )
                    ),
                    React.createElement('div', { className: 'graph-container' },
                        React.createElement('canvas', {
                            ref: canvasRef,
                            id: 'graph-canvas'
                        })
                    ),
                    tooltip && React.createElement('div', {
                        className: 'graph-tooltip',
                        style: {
                            left: `${tooltip.x + 10}px`,
                            top: `${tooltip.y + 10}px`
                        }
                    },
                        React.createElement('div', { className: 'tooltip-title' }, tooltip.node.label),
                        React.createElement('div', { className: 'tooltip-detail' }, `Type: ${tooltip.node.type}`)
                    ),
                    React.createElement('div', { className: 'explanation-card' },
                        React.createElement('div', { className: 'explanation-title' }, 'What you\'re seeing'),
                        React.createElement('div', { className: 'explanation-text' }, explanations[currentLane])
                    ),
                    React.createElement('div', { className: 'stats-footer' },
                        React.createElement('div', { className: 'stat-item' },
                            React.createElement('div', { className: 'stat-number provider' }, (stats.counts.providers || 0).toLocaleString()),
                            React.createElement('div', { className: 'stat-label' }, 'Providers')
                        ),
                        React.createElement('div', { className: 'stat-item' },
                            React.createElement('div', { className: 'stat-number drug' }, (stats.counts.drugs || 0).toLocaleString()),
                            React.createElement('div', { className: 'stat-label' }, 'Drugs')
                        ),
                        React.createElement('div', { className: 'stat-item' },
                            React.createElement('div', { className: 'stat-number diagnosis' }, (stats.counts.icd10_cm_codes || 0).toLocaleString()),
                            React.createElement('div', { className: 'stat-label' }, 'Diagnoses')
                        ),
                        React.createElement('div', { className: 'stat-item' },
                            React.createElement('div', { className: 'stat-number trial' }, (stats.counts.clinical_trials || 0).toLocaleString()),
                            React.createElement('div', { className: 'stat-label' }, 'Trials')
                        ),
                        React.createElement('div', { className: 'stat-item' },
                            React.createElement('div', { className: 'stat-number code' }, (stats.counts.hcpcs_codes || 0).toLocaleString()),
                            React.createElement('div', { className: 'stat-label' }, 'HCPCS Codes')
                        )
                    )
                )
            );
        };

        const App = () => {
            const [currentLane, setCurrentLane] = React.useState(null);
            const [stats, setStats] = React.useState({ totalCount: 1102176, counts: {} });

            React.useEffect(() => {
                fetchEntityCounts().then(data => {
                    if (data && data.totalCount > 0) setStats(data);
                }).catch(() => {});
            }, []);

            if (!currentLane) {
                return React.createElement(LanesScreen, {
                    onSelectLane: setCurrentLane,
                    stats
                });
            }

            return React.createElement(AppScreen, {
                currentLane,
                onSwitchLane: () => setCurrentLane(null),
                stats
            });
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
