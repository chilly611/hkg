<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useRef, createElement: h } = React;
        const root = ReactDOM.createRoot(document.getElementById('root'));

        // ==================== FORCE GRAPH ENGINE ====================
        class ForceGraph {
            constructor(canvas, width, height) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.width = width;
                this.height = height;
                this.nodes = [];
                this.edges = [];
                this.camera = { x: 0, y: 0, zoom: 1 };
                this.alpha = 0;
                this.draggingNode = null;
                this.panStart = null;
                this.animationFrameId = null;
                this.hoveredNodeId = null;
                this.tooltip = null;

                this.setupCanvas();
                this.setupEventListeners();
            }

            setupCanvas() {
                const dpr = window.devicePixelRatio || 1;
                this.dpr = dpr;
                this.canvas.width = this.width * dpr;
                this.canvas.height = this.height * dpr;
                this.canvas.style.width = this.width + 'px';
                this.canvas.style.height = this.height + 'px';
                this.ctx.scale(dpr, dpr);
            }

            setupEventListeners() {
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mouseup', (e) => this.onMouseUp(e));
                this.canvas.addEventListener('wheel', (e) => this.onWheel(e), { passive: false });
                this.canvas.addEventListener('mouseleave', () => this.onMouseLeave());
            }

            worldToScreen(x, y) {
                return {
                    x: (x + this.camera.x) * this.camera.zoom + this.width / 2,
                    y: (y + this.camera.y) * this.camera.zoom + this.height / 2
                };
            }

            screenToWorld(screenX, screenY) {
                return {
                    x: (screenX - this.width / 2) / this.camera.zoom - this.camera.x,
                    y: (screenY - this.height / 2) / this.camera.zoom - this.camera.y
                };
            }

            onMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const world = this.screenToWorld(screenX, screenY);

                if (this.draggingNode) {
                    this.draggingNode.x = world.x;
                    this.draggingNode.y = world.y;
                    this.draggingNode.vx = 0;
                    this.draggingNode.vy = 0;
                    this.alpha = Math.max(this.alpha, 0.1);
                    return;
                }

                if (this.panStart) {
                    const dx = (screenX - this.panStart.screenX) / this.camera.zoom;
                    const dy = (screenY - this.panStart.screenY) / this.camera.zoom;
                    this.camera.x = this.panStart.cameraX + dx;
                    this.camera.y = this.panStart.cameraY + dy;
                    return;
                }

                // Check hover
                let hovered = null;
                for (const node of this.nodes) {
                    const screen = this.worldToScreen(node.x, node.y);
                    const dist = Math.sqrt(
                        Math.pow(screenX - screen.x, 2) + Math.pow(screenY - screen.y, 2)
                    );
                    if (dist <= node.radius + 5) {
                        hovered = node;
                        break;
                    }
                }

                this.hoveredNodeId = hovered ? hovered.id : null;
                if (hovered) {
                    this.canvas.style.cursor = 'grab';
                    this.tooltip = {
                        x: screenX,
                        y: screenY,
                        node: hovered
                    };
                } else {
                    this.canvas.style.cursor = 'default';
                    this.tooltip = null;
                }
            }

            onMouseDown(e) {
                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const world = this.screenToWorld(screenX, screenY);

                // Check if clicking on a node
                for (const node of this.nodes) {
                    const screen = this.worldToScreen(node.x, node.y);
                    const dist = Math.sqrt(
                        Math.pow(screenX - screen.x, 2) + Math.pow(screenY - screen.y, 2)
                    );
                    if (dist <= node.radius + 5) {
                        this.draggingNode = node;
                        this.canvas.style.cursor = 'grabbing';
                        return;
                    }
                }

                // Start panning
                this.panStart = {
                    screenX: screenX,
                    screenY: screenY,
                    cameraX: this.camera.x,
                    cameraY: this.camera.y
                };
            }

            onMouseUp(e) {
                this.draggingNode = null;
                this.panStart = null;
                this.canvas.style.cursor = this.hoveredNodeId ? 'grab' : 'default';
            }

            onMouseLeave() {
                this.hoveredNodeId = null;
                this.tooltip = null;
                this.canvas.style.cursor = 'default';
            }

            onWheel(e) {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const world = this.screenToWorld(screenX, screenY);

                const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
                const newZoom = Math.max(0.1, Math.min(5.0, this.camera.zoom * zoomFactor));
                const zoomRatio = newZoom / this.camera.zoom;

                this.camera.x = world.x - (world.x - this.camera.x) * zoomRatio;
                this.camera.y = world.y - (world.y - this.camera.y) * zoomRatio;
                this.camera.zoom = newZoom;
            }

            addNode(node) {
                const exists = this.nodes.some(n => n.id === node.id);
                if (exists) return;

                const fullNode = {
                    id: node.id,
                    label: node.label || node.id,
                    type: node.type,
                    x: node.x !== undefined ? node.x : (Math.random() - 0.5) * 500,
                    y: node.y !== undefined ? node.y : (Math.random() - 0.5) * 500,
                    vx: 0,
                    vy: 0,
                    radius: node.isHub ? 40 : 25,
                    color: this.getTypeColor(node.type),
                    isHub: node.isHub || false,
                    metadata: node.metadata || {}
                };

                this.nodes.push(fullNode);
                this.alpha = Math.max(this.alpha, 0.3);
            }

            addEdge(source, target, metadata) {
                const edgeId = source < target ? source + '-' + target : target + '-' + source;
                const exists = this.edges.some(e => e.id === edgeId);
                if (exists) return;

                this.edges.push({
                    id: edgeId,
                    source: source,
                    target: target,
                    metadata: metadata || {}
                });
            }

            getTypeColor(type) {
                const colors = {
                    provider: { r: 52, g: 211, b: 153 },
                    drug: { r: 168, g: 139, b: 250 },
                    diagnosis: { r: 34, g: 211, b: 238 },
                    trial: { r: 212, g: 168, b: 83 },
                    code: { r: 249, g: 115, b: 22 },
                    exclusion: { r: 239, g: 68, b: 68 },
                    publication: { r: 168, g: 139, b: 250 },
                    hub: { r: 255, g: 255, b: 255 }
                };
                return colors[type] || colors.hub;
            }

            centerOnNode(nodeId) {
                const node = this.nodes.find(n => n.id === nodeId);
                if (node) {
                    this.camera.x = -node.x;
                    this.camera.y = -node.y;
                    this.camera.zoom = 1.5;
                }
            }

            simulate() {
                if (this.alpha < 0.001) return;

                // Apply forces
                for (let i = 0; i < this.nodes.length; i++) {
                    const node = this.nodes[i];
                    let fx = 0, fy = 0;

                    // Charge repulsion
                    for (let j = 0; j < this.nodes.length; j++) {
                        if (i === j) continue;
                        const other = this.nodes[j];
                        const dx = node.x - other.x;
                        const dy = node.y - other.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = Math.max(dist, 50);
                        const force = -200 / (minDist * minDist);

                        fx += (dx / dist) * force;
                        fy += (dy / dist) * force;
                    }

                    // Link spring force
                    for (const edge of this.edges) {
                        const other = edge.source === node.id
                            ? this.nodes.find(n => n.id === edge.target)
                            : edge.target === node.id
                            ? this.nodes.find(n => n.id === edge.source)
                            : null;

                        if (other) {
                            const dx = node.x - other.x;
                            const dy = node.y - other.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const targetDist = 150;
                            const k = 0.3;
                            const force = k * (dist - targetDist);

                            fx += (dx / dist) * force;
                            fy += (dy / dist) * force;
                        }
                    }

                    // Centering force
                    fx += -node.x * 0.01;
                    fy += -node.y * 0.01;

                    // Update velocity with damping
                    node.vx = (node.vx + fx) * 0.85;
                    node.vy = (node.vy + fy) * 0.85;

                    // Update position
                    node.x += node.vx;
                    node.y += node.vy;
                }

                // Cool down
                this.alpha *= 0.995;
            }

            render() {
                this.ctx.fillStyle = '#06060B';
                this.ctx.fillRect(0, 0, this.width, this.height);

                // Render edges
                for (const edge of this.edges) {
                    const source = this.nodes.find(n => n.id === edge.source);
                    const target = this.nodes.find(n => n.id === edge.target);
                    if (!source || !target) continue;

                    const s1 = this.worldToScreen(source.x, source.y);
                    const s2 = this.worldToScreen(target.x, target.y);

                    const brightness = (this.hoveredNodeId === source.id || this.hoveredNodeId === target.id)
                        ? 0.2 : 0.08;

                    this.ctx.strokeStyle = `rgba(255, 255, 255, ${brightness})`;
                    this.ctx.lineWidth = 1;
                    this.ctx.beginPath();

                    // Bezier curve
                    const cpx = (s1.x + s2.x) / 2 + (Math.random() - 0.5) * 20;
                    const cpy = (s1.y + s2.y) / 2 + (Math.random() - 0.5) * 20;
                    this.ctx.quadraticCurveTo(cpx, cpy, s2.x, s2.y);
                    this.ctx.moveTo(s1.x, s1.y);
                    this.ctx.quadraticCurveTo(cpx, cpy, s2.x, s2.y);

                    this.ctx.stroke();
                }

                // Render nodes
                for (const node of this.nodes) {
                    const screen = this.worldToScreen(node.x, node.y);
                    const isHovered = this.hoveredNodeId === node.id;

                    // Node background pill
                    const color = node.color;
                    const alpha = isHovered ? 0.25 : 0.15;
                    this.ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
                    this.ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${isHovered ? 1 : 0.5})`;
                    this.ctx.lineWidth = isHovered ? 2 : 1;

                    this.ctx.beginPath();
                    this.ctx.roundRect(
                        screen.x - node.radius,
                        screen.y - node.radius,
                        node.radius * 2,
                        node.radius * 2,
                        8
                    );
                    this.ctx.fill();
                    this.ctx.stroke();

                    // Glow on hover
                    if (isHovered) {
                        this.ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.1)`;
                        this.ctx.beginPath();
                        this.ctx.arc(screen.x, screen.y, node.radius + 10, 0, Math.PI * 2);
                        this.ctx.fill();
                    }

                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '12px "DM Sans"';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';

                    const maxWidth = node.radius * 1.8;
                    const label = this.truncateText(node.label, maxWidth);
                    this.ctx.fillText(label, screen.x, screen.y);
                }

                // Render tooltip
                if (this.tooltip) {
                    this.renderTooltip(this.tooltip.x, this.tooltip.y, this.tooltip.node);
                }
            }

            truncateText(text, maxWidth) {
                const maxChars = 50;
                if (text.length > maxChars) {
                    return text.substring(0, maxChars - 3) + '...';
                }
                return text;
            }

            renderTooltip(x, y, node) {
                const padding = 10;
                const width = Math.min(200, this.width - x - 20);
                const height = 60;

                this.ctx.fillStyle = 'rgba(13, 13, 20, 0.95)';
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                this.ctx.lineWidth = 1;
                this.ctx.fillRect(x + padding, y + padding, width, height);
                this.ctx.strokeRect(x + padding, y + padding, width, height);

                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 12px "DM Sans"';
                this.ctx.textAlign = 'left';
                this.ctx.textBaseline = 'top';
                this.ctx.fillText(this.truncateText(node.label, 30), x + padding + 8, y + padding + 8);

                this.ctx.fillStyle = '#888';
                this.ctx.font = '10px "DM Sans"';
                this.ctx.fillText(node.type, x + padding + 8, y + padding + 28);

                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);

                    graphData.nodes.forEach(node => graph.addNode(node));
                    graphData.edges.forEach(edge => {
                        const source = graphData.nodes.find(n => n.id === edge.source);
                        const target = graphData.nodes.find(n => n.id === edge.target);
                        if (source && target) {
                            graph.addEdge(edge.source, edge.target);

                    });
                    graph.start();

                    if (graphRef.current && graphRef.current.animationFrameId) {

                        )
                    ),
                    h('div', { className: 'app-body' },
                        h('div', { className: 'graph-section' },
                            h('div', { className: 'graph-canvas' },
                                h(OverviewGraphCanvas, { width: 1600, height: 1000 })
                            )
                        )
                    )
                );
            }
        }

        root.render(h(App));
    </script>
</body>
</html>
