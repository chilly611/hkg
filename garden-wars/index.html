function MetricBar({label,value,max,color,fmt}){
  const pct=Math.min((Math.abs(value)/max)*100,100);
  const display=fmt?fmt(value):value;
  return(
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>
        <span style={{color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".08em"}}>{label}</span>
        <span style={{color:color,fontFamily:mono,fontWeight:500,fontSize:10}}>{display}</span>
      </div>
      <div style={{height:3,background:"rgba(255,255,255,.04)",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",background:color,borderRadius:2,transition:"width .8s "+ease}}/>
      </div>
    </div>
  );
}

function Dashboard({metrics,open,onToggle}){
  const af=(v)=>"$"+(v>=1000?(v/1000).toFixed(0)+"M":v+"K");
  return(
    <div style={{position:"fixed",top:0,left:0,width:open?"260px":"0px",height:"100vh",background:"rgba(8,8,12,.97)",backdropFilter:"blur(16px)",borderRight:open?"1px solid rgba(255,255,255,.06)":"none",zIndex:60,transition:"width .4s "+ease,overflow:"hidden"}}>
      <div style={{padding:"14px 16px",width:260,opacity:open?1:0,transition:"opacity .3s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:".15em",color:C.gold,fontWeight:600}}>Mission Control</div>
          <button onClick={onToggle} style={{background:"none",border:"none",color:"rgba(255,255,255,.3)",cursor:"pointer",fontSize:16}}>×</button>
        </div>
        <MetricBar label="Y1 ARR" value={metrics.arr_y1} max={2000} color={C.gold} fmt={af}/>
        <MetricBar label="Y3 ARR" value={metrics.arr_y3} max={50000} color={C.green} fmt={af}/>
        <MetricBar label="Y5 ARR" value={metrics.arr_y5} max={300000} color={C.blue} fmt={af}/>
        <div style={{height:1,background:"rgba(255,255,255,.04)",margin:"8px 0"}}/>
        <MetricBar label="Risk" value={metrics.risk} max={10} color={metrics.risk>7?C.red:metrics.risk>4?C.amber:C.green} fmt={v=>v+"/10"}/>
        <MetricBar label="Moat" value={metrics.moat} max={10} color={C.purple} fmt={v=>v+"/10"}/>
        <MetricBar label="Time to Rev" value={metrics.time_rev} max={18} color={metrics.time_rev>8?C.red:C.green} fmt={v=>v+" mo"}/>
        <MetricBar label="Team" value={metrics.team} max={20} color={C.cyan} fmt={v=>v+" people"}/>
        <MetricBar label="Capital Need" value={metrics.capital} max={8000} color={C.orange} fmt={v=>"$"+v+"K"}/>
        <MetricBar label="Regulatory" value={metrics.regulatory} max={10} color={metrics.regulatory>6?C.red:C.amber} fmt={v=>v+"/10"}/>
      </div>
    </div>
  );
}

function TrailMap({history,onJumpTo}){
  const scrollRef=useRef(null);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollLeft=scrollRef.current.scrollWidth},[history.length]);
  if(history.length===0) return null;
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,height:72,background:"rgba(6,6,8,.95)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,.06)",zIndex:55,display:"flex",alignItems:"center",padding:"0 16px"}}>
      <div ref={scrollRef} style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto",flex:1,paddingRight:80,scrollBehavior:"smooth"}}>

function App(){
  const[metrics,setMetrics]=useState(initMetrics());
  const[history,setHistory]=useState([]);
  const[showCons,setShowCons]=useState(null);
  const[showResearch,setShowResearch]=useState(null);
  const[showSaves,setShowSaves]=useState(false);
  const[dashOpen,setDashOpen]=useState(false);
  const[compassOpen,setCompassOpen]=useState(false);
  const[saves,setSaves]=useState(()=>{try{return JSON.parse(localStorage.getItem("gw2")||"[]")}catch(e){return[]}});
  const[started,setStarted]=useState(false);

  const currentDecision=useMemo(()=>{
    if(showCons) return null;
    const madeIds=new Set(history.map(h=>h._did));
    for(const d of DECISIONS){
      if(madeIds.has(d.id)) continue;
      if(d.requires&&!d.requires.some(r=>history.some(h=>h.id===r))) continue;
      return d;
    }
    return null;
  },[history,showCons]);

  const applyEffects=(eff,dir=1)=>{
    setMetrics(prev=>{
      const m={...prev};
      Object.entries(eff).forEach(([k,v])=>{
        if(k in m&&typeof v==="number"){
          if(["risk","moat","regulatory","time_rev"].includes(k)) m[k]=Math.max(0,Math.min(10,dir===1?v:prev[k]));
          else m[k]=(m[k]||0)+v*dir;
        }
      });
      if(dir===1){m.decisions_made++;m.turn++}else{m.decisions_made=Math.max(0,m.decisions_made-1);m.turn=Math.max(0,m.turn-1)}
      return m;
    });
  };

  const choose=(dec,opt)=>{
    const entry={...opt,_did:dec.id,_cat:dec.cat,_ts:Date.now()};
    setHistory(p=>[...p,entry]);
    applyEffects(opt.effects);
    setShowCons(entry);
  };

  const goBack=()=>{
    if(!history.length) return;
    const last=history[history.length-1];
    setHistory(p=>p.slice(0,-1));
    applyEffects(last.effects,-1);
    setShowCons(null);
  };

  const jumpTo=(idx)=>{
    const removed=history.slice(idx+1);
    removed.reverse().forEach(h=>applyEffects(h.effects,-1));
    setHistory(history.slice(0,idx+1));
    setShowCons(null);
  };

  const saveFn=(name)=>{
    const s={name,metrics:{...metrics},history:[...history],ts:Date.now()};
    const ns=[...saves,s];setSaves(ns);
    try{localStorage.setItem("gw2",JSON.stringify(ns))}catch(e){}
  };
  const loadFn=(s)=>{setMetrics({...s.metrics});setHistory([...s.history]);setShowSaves(false);setShowCons(null);setStarted(true)};
  const delFn=(i)=>{const ns=saves.filter((_,j)=>j!==i);setSaves(ns);try{localStorage.setItem("gw2",JSON.stringify(ns))}catch(e){}};
  const restart=()=>{setMetrics(initMetrics());setHistory([]);setShowCons(null);setShowResearch(null)};
  const handleNav=(action)=>{
    if(action==="dashboard")setDashOpen(p=>!p);
    if(action==="save")setShowSaves(true);
    if(action==="load")setShowSaves(true);
    if(action==="research"&&currentDecision)setShowResearch(currentDecision);
    if(action==="restart"){if(confirm("Start over? Unsaved progress will be lost."))restart()}
    if(action==="back")goBack();
  };

  if(!started){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 50% 30%,rgba(212,168,83,.06) 0%,transparent 70%),#060608",textAlign:"center"}}>
        <img src={IM.tree} alt="" style={{width:80,marginBottom:20,opacity:.8}} className="fade-up"/>
        <h1 className="fade-up" style={{fontFamily:serif,fontSize:"clamp(36px,8vw,64px)",fontWeight:400,lineHeight:1.05,animationDelay:".1s"}}>Garden <span style={{fontStyle:"italic",color:C.gold}}>Wars</span></h1>
        <p className="fade-up" style={{fontSize:15,color:"rgba(255,255,255,.35)",maxWidth:500,lineHeight:1.7,marginTop:12,animationDelay:".2s"}}>CEO Strategy RPG for The Knowledge Gardens.<br/>Make decisions. See consequences. Build your empire.</p>
        <div className="fade-up" style={{marginTop:32,display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center",animationDelay:".4s"}}>
          <button onClick={()=>setStarted(true)} style={{padding:"14px 32px",borderRadius:12,border:"none",background:C.gold,color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",animation:"glow 3s ease infinite"}}>New Game</button>
          {saves.length>0&&<button onClick={()=>{setShowSaves(true);setStarted(true)}} style={{padding:"14px 32px",borderRadius:12,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"rgba(255,255,255,.5)",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Load ({saves.length})</button>}
        </div>
        <div className="fade-up" style={{marginTop:60,display:"flex",gap:20,opacity:.15,animationDelay:".6s"}}>
          <img src={IM.hammer} alt="" style={{height:40,objectFit:"contain"}}/>
          <img src={IM.stethV} alt="" style={{height:40,objectFit:"contain"}}/>
          <img src={IM.microscope} alt="" style={{height:40,objectFit:"contain"}}/>
          <img src={IM.compass} alt="" style={{height:40,objectFit:"contain"}}/>
        </div>
        <p style={{fontSize:10,color:"rgba(255,255,255,.12)",marginTop:20}}>Chilly Dahlgren & John Bou · The Knowledge Gardens · April 2026</p>
        {showSaves&&<SaveModal saves={saves} onSave={saveFn} onLoad={loadFn} onDelete={delFn} onClose={()=>setShowSaves(false)}/>}
      </div>
    );
  }

  const gameOver=!currentDecision&&!showCons;
  return(
    <div style={{minHeight:"100vh",paddingBottom:history.length>0?80:0}}>
      <Dashboard metrics={metrics} open={dashOpen} onToggle={()=>setDashOpen(p=>!p)}/>

      {/* TOP BAR */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(6,6,8,.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={IM.hex} alt="" style={{width:22,height:22,objectFit:"contain",opacity:.6}}/>
          <span style={{fontFamily:serif,fontSize:15,color:C.gold}}>Garden Wars</span>
          <span style={{fontSize:10,color:"rgba(255,255,255,.2)"}}>Turn {metrics.turn}</span>
        </div>
        <div style={{display:"flex",gap:8,fontSize:10,color:"rgba(255,255,255,.3)"}}>
          <span style={{color:C.gold}}>Y5: ${(metrics.arr_y5/1000).toFixed(0)}M</span>
          <span>·</span>
          <span style={{color:metrics.risk>6?C.red:C.green}}>Risk: {metrics.risk}</span>
          <span>·</span>
          <span style={{color:C.purple}}>Moat: {metrics.moat}</span>
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"clamp(20px,4vw,40px)"}}>
        {showCons&&!showResearch&&<ConsequencePanel choice={showCons} onContinue={()=>setShowCons(null)}/>}
        {!showCons&&currentDecision&&<DecisionCard decision={currentDecision} onChoose={(opt)=>choose(currentDecision,opt)} onResearch={()=>setShowResearch(currentDecision)}/>}
        {gameOver&&(
          <div className="fade-up" style={{textAlign:"center",maxWidth:600,margin:"40px auto"}}>
            <img src={IM.tree} alt="" style={{width:70,margin:"0 auto 16px",display:"block",opacity:.6}}/>
            <h2 style={{fontFamily:serif,fontSize:"clamp(26px,5vw,40px)",color:C.gold,marginBottom:10}}>Strategy Complete</h2>
            <p style={{fontSize:13,color:"rgba(255,255,255,.4)",lineHeight:1.7,marginBottom:20}}>Save this path, load a different one, or restart to explore new decisions.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
              {[["Y5 ARR","$"+(metrics.arr_y5/1000).toFixed(0)+"M",C.gold],["Risk",metrics.risk+"/10",metrics.risk>6?C.red:C.green],["Moat",metrics.moat+"/10",C.purple]].map(([l,v,c],i)=>(
                <div key={i} style={{padding:12,borderRadius:10,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)"}}>
                  <div style={{fontSize:22,fontWeight:700,color:c,fontFamily:serif}}>{v}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>setShowSaves(true)} style={{padding:"11px 22px",borderRadius:10,border:"none",background:C.gold,color:"#000",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Save Strategy</button>
              <button onClick={restart} style={{padding:"11px 22px",borderRadius:10,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"rgba(255,255,255,.4)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>New Game</button>
            </div>
          </div>
        )}
      </div>

      {/* TRAIL MAP */}
      <TrailMap history={history} onJumpTo={jumpTo}/>

      {/* COMPASS NAV */}
      <CompassNav onNavigate={handleNav} isOpen={compassOpen} onToggle={()=>setCompassOpen(p=>!p)}/>

      {/* MODALS */}
      {showResearch&&<ResearchPanel decision={showResearch} metrics={metrics} history={history} onClose={()=>setShowResearch(null)}/>}
      {showSaves&&<SaveModal saves={saves} onSave={saveFn} onLoad={loadFn} onDelete={delFn} onClose={()=>setShowSaves(false)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
