const initM=()=>({y1:0,y3:0,y5:0,risk:5,rev:12,team:2,cap:0,moat:5,reg:3,turn:0});

function App(){
  const[m,setM]=useState(initM());
  const[hist,setHist]=useState([]);
  const[preview,setPreview]=useState(null);// option being previewed before confirming
  const[showSaves,setShowSaves]=useState(false);
  const[showFrontier,setShowFrontier]=useState(false);
  const[planted,setPlanted]=useState(["bkg","okg","hkg"]);
  const[dashOpen,setDashOpen]=useState(false);
  const[compOpen,setCompOpen]=useState(false);
  const[started,setStarted]=useState(false);
  const[saves,setSaves]=useState(()=>{try{return JSON.parse(localStorage.getItem("gw3")||"[]")}catch(e){return[]}});
  const trailRef=useRef(null);

  const curDec=useMemo(()=>{
    if(preview) return null;
    const done=new Set(hist.map(h=>h._did));
    for(const d of D){
      if(done.has(d.id)) continue;
      if(d.requires&&!d.requires.some(r=>hist.some(h=>h.id===r))) continue;
      return d;
    }
    return null;
  },[hist,preview]);

  const apply=(fx,dir=1)=>{
    setM(p=>{
      const n={...p};
      Object.entries(fx).forEach(([k,v])=>{if(k in n&&typeof v==="number"){
        if(["risk","moat","reg","rev"].includes(k))n[k]=Math.max(0,Math.min(10,dir===1?v:p[k]));
        else n[k]=(n[k]||0)+v*dir;
      }});
      n.turn+=dir;
      return n;
    });
  };

  const confirmChoice=()=>{
    if(!preview) return;
    const dec=D.find(d=>d.opts.some(o=>o.id===preview.id));
    const entry={...preview,_did:dec?.id,_cat:dec?.cat,_ts:Date.now()};
    setHist(p=>[...p,entry]);
    apply(preview.fx);
    setPreview(null);
    setTimeout(()=>{if(trailRef.current)trailRef.current.scrollLeft=trailRef.current.scrollWidth},100);
  };

  const jumpTo=(idx)=>{
    const removed=hist.slice(idx+1);
    [...removed].reverse().forEach(h=>apply(h.fx,-1));
    setHist(hist.slice(0,idx+1));
    setPreview(null);
  };

  const goBack=()=>{if(hist.length)jumpTo(hist.length-2<0?-1:hist.length-2);if(hist.length===1){setHist([]);apply(hist[0].fx,-1)}};

  const goHome=()=>{setStarted(false);setPreview(null)};

  const saveFn=(name)=>{
    const s={name,m:{...m},hist:[...hist],ts:Date.now()};
    const ns=[...saves,s];setSaves(ns);
    try{localStorage.setItem("gw3",JSON.stringify(ns))}catch(e){}
  };
  const loadFn=(s)=>{setM({...s.m});setHist([...s.hist]);setShowSaves(false);setPreview(null);setStarted(true)};
  const delFn=(i)=>{const ns=saves.filter((_,j)=>j!==i);setSaves(ns);try{localStorage.setItem("gw3",JSON.stringify(ns))}catch(e){}};
  const restart=()=>{if(!confirm("Start fresh? Unsaved progress lost."))return;setM(initM());setHist([]);setPreview(null)};
  
  const plantGarden=(id)=>{
    if(planted.includes(id)) return;
    setPlanted(p=>[...p,id]);
    const g=V.find(v=>v.id===id);
    if(g){setM(p=>({...p,y5:p.y5+g.y5,cap:p.cap+300,team:p.team+2,moat:Math.min(10,p.moat+1)}))}
    setShowFrontier(false);
  };

  const sharePath=()=>{
    const path=hist.map((h,i)=>(i+1)+". "+h.label+" ("+h._cat+")").join("\n");
    const body=encodeURIComponent("Knowledge Gardens Strategy Path\n\nDecisions:\n"+path+"\n\nProjected Y5 ARR: $"+(m.y5/1000).toFixed(0)+"M\nRisk: "+m.risk+"/10\nMoat: "+m.moat+"/10\nTime to Revenue: "+m.rev+" months\n\nExplore interactively: https://garden-wars.vercel.app");
    window.open("mailto:?subject="+encodeURIComponent("Garden Wars Strategy Path")+"&body="+body);
  };

  const copyResearchPrompt=(opt)=>{
    const ctx="I'm the CEO of The Knowledge Gardens, a platform company building AI-native operating systems for trillion-dollar industries. We have 12.1M healthcare records, 9.4M NPI providers, and two co-founders: John Bou (built KLAS #1 credentialing platform Modio, acquired by CHG) and Chilly Dahlgren (2nd-gen AI pioneer, built the Knowledge Garden architecture).\n\nMy current strategic path: "+hist.map(h=>h.label).join(" → ")+"\n\nI'm considering: "+opt.label+" — "+opt.sub+"\n\nGive me a deep strategic analysis: competitive dynamics, specific revenue projections, regulatory risks, and what you'd do in my position. Be extremely specific with numbers and timelines.";
    navigator.clipboard?.writeText(ctx);
    alert("Research prompt copied! Paste into Claude for deep analysis.");
  };

  const af=(v)=>"$"+(v>=1000?(v/1000).toFixed(0)+"M":v+"K");
  const compassItems=[
    {icon:"🗺️",label:"Frontier",action:()=>setShowFrontier(true),color:C.gold},
    {icon:"📊",label:"Dashboard",action:()=>setDashOpen(p=>!p),color:C.green},
    {icon:"💾",label:"Save",action:()=>setShowSaves(true),color:C.cyan},
    {icon:"📂",label:"Load",action:()=>setShowSaves(true),color:C.purple},
    {icon:"📧",label:"Share",action:sharePath,color:C.blue},
    {icon:"←",label:"Back",action:goBack,color:C.amber},
    {icon:"↺",label:"Restart",action:restart,color:C.red},
  ];

  // ═══ TITLE SCREEN ═══
  if(!started) return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,background:"radial-gradient(ellipse at 50% 30%,rgba(212,168,83,.06) 0%,transparent 70%),#060608",textAlign:"center"}}>
      <img src={I.tree} alt="" style={{width:80,marginBottom:20,opacity:.8}} className="fu"/>
      <h1 className="fu" style={{fontFamily:sf,fontSize:"clamp(36px,8vw,64px)",fontWeight:400,animationDelay:".1s"}}>Garden <span style={{fontStyle:"italic",color:C.gold}}>Wars</span></h1>
      <p className="fu" style={{fontSize:15,color:"rgba(255,255,255,.35)",maxWidth:500,lineHeight:1.7,marginTop:12,animationDelay:".2s"}}>CEO Strategy RPG for The Knowledge Gardens.<br/>Explore decisions. See consequences. Build your empire.</p>
      <div className="fu" style={{marginTop:32,display:"flex",gap:12,animationDelay:".4s"}}>
        <button onClick={()=>setStarted(true)} style={{padding:"14px 32px",borderRadius:12,border:"none",background:C.gold,color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",animation:"glow 3s ease infinite"}}>New Game</button>
        {saves.length>0&&<button onClick={()=>{setShowSaves(true);setStarted(true)}} style={{padding:"14px 32px",borderRadius:12,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"rgba(255,255,255,.5)",fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>Load ({saves.length})</button>}
      </div>
      <p style={{fontSize:10,color:"rgba(255,255,255,.12)",marginTop:40}}>Chilly Dahlgren & John Bou · April 2026</p>
      {showSaves&&<SaveModal saves={saves} onSave={saveFn} onLoad={loadFn} onDelete={delFn} onClose={()=>setShowSaves(false)}/>}
    </div>
  );

  // ═══ GAME ═══
  const gameOver=!curDec&&!preview;

              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:1}}>
                <span style={{color:"rgba(255,255,255,.3)",textTransform:"uppercase",letterSpacing:".06em"}}>{l}</span>

        </div>
        <div style={{display:"flex",gap:8,fontSize:10,color:"rgba(255,255,255,.3)"}}>
          <span style={{color:C.gold}}>{af(m.y5)}</span>
          <span style={{color:m.risk>6?C.red:C.green}}>Risk:{m.risk}</span>
          <span style={{color:C.purple}}>Moat:{m.moat}</span>

        </div>
      </div>

      {/* AMBIENT FLOATING IMAGERY */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",overflow:"hidden",zIndex:0}}>
        <img src={I.tree} alt="" className="float1" style={{position:"absolute",top:"15%",left:"3%",width:60,opacity:.025,filter:"blur(1px)"}}/>
        <img src={I.stV} alt="" className="float2" style={{position:"absolute",top:"40%",right:"5%",width:50,opacity:.02,filter:"blur(1px)"}}/>
        <img src={I.ham} alt="" className="float3" style={{position:"absolute",bottom:"25%",left:"8%",width:40,opacity:.02,filter:"blur(1px)"}}/>
        <img src={I.mic} alt="" className="float1" style={{position:"absolute",top:"60%",right:"12%",width:45,opacity:.015,filter:"blur(2px)",animationDelay:"2s"}}/>

        <div style={{position:"absolute",top:"50%",left:"50%",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(212,168,83,.03) 0%,transparent 70%)",transform:"translate(-50%,-50%)",animation:"breathe 8s ease infinite"}}/>
      </div>

      {/* MAIN */}

            <div className="fu" style={{maxWidth:760,margin:"0 auto"}}>

                <div style={{padding:"20px 24px 24px"}}>
                  <h3 style={{fontFamily:sf,fontSize:26,color:C.gold,marginBottom:4}}>{o.label}</h3>

                  {/* RESEARCH PANEL */}

                    })}
                  </div>

                  <div style={{marginTop:20,display:"flex",gap:10}}>
                    <button onClick={confirmChoice} style={{flex:1,padding:"14px",borderRadius:10,border:"none",background:C.gold,color:"#000",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>✓ Commit to This Path</button>
                    <button onClick={()=>setPreview(null)} style={{padding:"14px 20px",borderRadius:10,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"rgba(255,255,255,.4)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Back</button>

        })()}

        {/* DECISION CARDS */}
        {!preview&&curDec&&(
          <div className="fu" style={{position:"relative",zIndex:1}}>
            <div className="shimmer-bar" style={{height:2,borderRadius:1,marginBottom:16}}/>

                {curDec.id==="start"&&"What's more important right now — speed to revenue or ceiling height? Can a 2-person team execute on the highest-complexity option? Which story resonates more with investors: traction proof or massive TAM?"}
                {curDec.id==="hkg_lane"&&"Which stakeholder do you understand best? Which revenue model has the shortest path to cash? Where does John's network create the most unfair advantage? Which lane builds the data asset that powers all other lanes?"}
                {curDec.id==="patient_scope"&&"How broad can you go without losing focus? What's the regulatory exposure of each scope level? Which scope generates the fastest traffic growth? Where do the highest per-transaction revenue opportunities live?"}
                {curDec.id==="bkg_rev"&&"How important is viral growth vs. immediate revenue per customer? Can you afford to support free users? How do contractors find new software tools — ads, word of mouth, trade shows, app stores?"}
                {curDec.id==="fundraise"&&"What's your personal runway in months? How much dilution are you willing to accept? Can BKG revenue realistically hit $25K MRR in 90 days? Is the AI funding window closing or opening?"}
                {!["start","hkg_lane","patient_scope","bkg_rev","fundraise"].includes(curDec.id)&&"What are you optimizing for — speed, scale, or safety? Which option creates the most optionality for future decisions? What would you regret NOT doing in 12 months?"}

                  style={{borderRadius:14,overflow:"hidden",background:"rgba(255,255,255,.02)",border:"1.5px solid rgba(255,255,255,.06)",cursor:"pointer",transition:"all .35s "+ez,display:"flex",flexDirection:"column",animationDelay:(i*.08)+"s"}}

                    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
                      {o.fx.y5>0&&<span style={{fontSize:8,padding:"2px 6px",borderRadius:4,background:C.green+"15",color:C.green}}>Y5: {af(o.fx.y5)}</span>}
                      <span style={{fontSize:8,padding:"2px 6px",borderRadius:4,background:(o.fx.risk>6?C.red:C.green)+"15",color:o.fx.risk>6?C.red:C.green}}>Risk:{o.fx.risk}</span>

                    </div>

              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.purple}}>🔬 Need more information?</div>

              </div>
              <button onClick={()=>{const p="I'm CEO of The Knowledge Gardens (AI-native operating systems for $trillion industries). 12.1M healthcare records, 9.4M NPI providers. Co-founders: John Bou (KLAS #1 credentialing) + Chilly Dahlgren (2nd-gen AI pioneer).\n\nPath so far: "+(hist.map(h=>h.label).join(" → ")||"Start")+"\n\nDecision: "+curDec.title+" — "+curDec.desc+"\n\nOptions: "+curDec.opts.map(o=>o.label+": "+o.sub).join(" | ")+"\n\nGive me a deep strategic analysis with specific numbers, competitive intel, and a clear recommendation. What would you do and why?";navigator.clipboard?.writeText(p);alert("Research prompt copied! Paste into Claude for deep analysis.")}}
                style={{padding:"10px 20px",borderRadius:8,border:"1.5px solid "+C.purple+"40",background:C.purple+"10",color:C.purple,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .3s "+ez}}
                onMouseEnter={e=>e.currentTarget.style.background=C.purple+"20"}
                onMouseLeave={e=>e.currentTarget.style.background=C.purple+"10"}>
                📋 Copy Research Prompt for Claude
              </button>
            </div>
          </div>
        )}

        {/* GAME OVER */}
        {gameOver&&(
          <div className="fu" style={{textAlign:"center",maxWidth:550,margin:"40px auto"}}>
            <img src={I.tree} alt="" style={{width:60,margin:"0 auto 16px",display:"block",opacity:.5}}/>

              {[[af(m.y5),"Y5 ARR",C.gold],[m.risk+"/10","Risk",m.risk>6?C.red:C.green],[m.moat+"/10","Moat",C.purple]].map(([v,l,c],i)=>(
                <div key={i} style={{padding:12,borderRadius:10,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)"}}><div style={{fontSize:22,fontWeight:700,color:c,fontFamily:sf}}>{v}</div><div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>{l}</div></div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setShowSaves(true)} style={{padding:"10px 20px",borderRadius:8,border:"none",background:C.gold,color:"#000",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>💾 Save</button>

            </div>
          </div>
        )}
      </div>

      {/* TRAIL MAP */}
      {hist.length>0&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,height:68,background:"rgba(6,6,8,.95)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,.06)",zIndex:55,display:"flex",alignItems:"center",padding:"0 16px"}}>
          <div ref={trailRef} style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto",flex:1,paddingRight:80}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"rgba(255,255,255,.1)",flexShrink:0}}/>
            <div style={{width:16,height:1,background:"rgba(255,255,255,.06)",flexShrink:0}}/>
            {hist.map((h,i)=>{
              const last=i===hist.length-1;
              const cc={Foundation:C.gold,"Lane Selection":C.green,Scope:C.blue,Revenue:C.orange,Capital:C.purple,Team:C.cyan,Partnerships:C.teal,Expansion:C.pink};
              const co=cc[h._cat]||C.gold;
              return(
                <React.Fragment key={i}>
                  <div onClick={()=>jumpTo(i)} title={"Rewind to: "+h.label} className={last?"tp":""}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",flexShrink:0,padding:"0 4px",minWidth:70}}>
                    <div style={{width:last?12:8,height:last?12:8,borderRadius:"50%",background:last?co:co+"50",border:"2px solid "+(last?co:co+"30"),transition:"all .3s"}}/>
                    <div style={{fontSize:8,color:last?co:"rgba(255,255,255,.3)",fontWeight:last?600:400,textAlign:"center",lineHeight:1.2,marginTop:3,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.label}</div>
                    <div style={{fontSize:6,color:"rgba(255,255,255,.15)"}}>{h._cat}</div>
                  </div>
                  {i<hist.length-1&&<div style={{width:20,height:1,background:"rgba(255,255,255,.06)",flexShrink:0}}/>}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      {/* COMPASS — UNMISSABLE */}
      <div style={{position:"fixed",bottom:hist.length>0?82:20,right:16,zIndex:80,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
        {compOpen&&<div style={{position:"absolute",bottom:70,right:0,display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
          {compassItems.map((ci,i)=>(
            <div key={i} onClick={()=>{ci.action();setCompOpen(false)}}
              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:10,background:"rgba(8,8,12,.95)",border:"1.5px solid "+ci.color+"50",cursor:"pointer",animation:"compassItem .3s "+ez+" "+(i*.04)+"s both",backdropFilter:"blur(12px)",whiteSpace:"nowrap"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=ci.color}
              onMouseLeave={e=>e.currentTarget.style.borderColor=ci.color+"50"}>
              <span style={{fontSize:16}}>{ci.icon}</span>
              <span style={{fontSize:12,color:ci.color,fontWeight:600}}>{ci.label}</span>
            </div>
          ))}
        </div>}
        <button onClick={()=>setCompOpen(p=>!p)}
          style={{width:56,height:56,borderRadius:"50%",background:compOpen?"rgba(212,168,83,.2)":"rgba(12,12,16,.95)",border:"2.5px solid "+(compOpen?C.gold:C.gold+"60"),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",transition:"all .3s "+ez,backdropFilter:"blur(12px)",animation:compOpen?"none":"glow 3s ease infinite",boxShadow:"0 4px 20px rgba(0,0,0,.5)"}}>
          <img src={I.hex} alt="" style={{width:26,height:26,objectFit:"contain",opacity:compOpen?1:.7,transition:"all .3s",transform:compOpen?"rotate(60deg)":"none"}}/>
        </button>
        {!compOpen&&<span style={{fontSize:7,color:C.gold+"80",textTransform:"uppercase",letterSpacing:".15em",fontWeight:600}}>Menu</span>}
      </div>

      {/* SAVE MODAL */}
      {showSaves&&<SaveModal saves={saves} onSave={saveFn} onLoad={loadFn} onDelete={delFn} onClose={()=>setShowSaves(false)}/>}
      {/* FRONTIER MAP */}
      {showFrontier&&<FrontierMap onClose={()=>setShowFrontier(false)} planted={planted} onPlant={plantGarden}/>}
    </div>
  );
}

function FrontierMap({onClose,planted,onPlant}){
  const[sel,setSel]=useState(null);
  const v=sel?V.find(x=>x.id===sel):null;
  const isPlanted=(id)=>planted.includes(id);
  const Sec=({t,txt,c})=><div style={{marginBottom:10}}><div style={{fontSize:9,fontWeight:600,color:c,textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>{t}</div><div style={{fontSize:11,color:"rgba(255,255,255,.5)",lineHeight:1.7}}>{txt}</div></div>;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(4,4,6,.97)",zIndex:100,overflow:"auto",padding:"0 0 40px"}}>
      <div style={{position:"sticky",top:0,background:"rgba(4,4,6,.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:2}}>
        <div><span style={{fontFamily:sf,fontSize:18,color:C.gold}}>Frontier Map</span><span style={{fontSize:10,color:"rgba(255,255,255,.2)",marginLeft:8}}>12 Gardens · {V.reduce((a,v)=>a+v.y5,0)/1000|0}M Combined Y5 ARR</span></div>
        <button onClick={onClose} style={{padding:"6px 14px",borderRadius:6,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"rgba(255,255,255,.4)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Close ×</button>
      </div>
      {!sel?(
        <div style={{maxWidth:1100,margin:"20px auto",padding:"0 16px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
          {V.map(g=>{
            const ip=isPlanted(g.id);
            return(
              <div key={g.id} onClick={()=>setSel(g.id)}
                style={{borderRadius:12,padding:14,background:ip?"rgba(255,255,255,.04)":"rgba(255,255,255,.015)",border:"1.5px solid "+(ip?g.c+"40":"rgba(255,255,255,.05)"),cursor:"pointer",transition:"all .3s "+ez,position:"relative"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=g.c+"60"}
                onMouseLeave={e=>e.currentTarget.style.borderColor=ip?g.c+"40":"rgba(255,255,255,.05)"}>
                {ip&&<div style={{position:"absolute",top:8,right:8,fontSize:7,padding:"2px 6px",borderRadius:4,background:g.c+"20",color:g.c,fontWeight:600}}>PLANTED</div>}
                <div style={{fontSize:22,marginBottom:6}}>{g.ic}</div>
                <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:2}}>{g.n}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginBottom:6}}>{g.tam} market · Y5: ${(g.y5/1000)|0}M ARR</div>
                <div style={{fontSize:10,color:g.c}}>{g.deploy}</div>
                <div style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:6,lineHeight:1.5}}>{g.w.slice(0,100)}...</div>
                <div style={{marginTop:8,fontSize:10,color:C.gold}}>Tap to explore →</div>
              </div>
            );
          })}
        </div>
      ):(
        <div className="fu" style={{maxWidth:720,margin:"20px auto",padding:"0 16px"}}>
          <button onClick={()=>setSel(null)} style={{marginBottom:12,padding:"6px 14px",borderRadius:6,border:"1px solid rgba(255,255,255,.08)",background:"transparent",color:"rgba(255,255,255,.35)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>← All Gardens</button>
          <div style={{borderRadius:14,background:"rgba(255,255,255,.02)",border:"1px solid "+v.c+"20",overflow:"hidden"}}>
            <div style={{padding:"20px 22px",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:28,marginBottom:4}}>{v.ic}</div>
                <div style={{fontFamily:sf,fontSize:26,color:v.c}}>{v.n} Knowledge Garden</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginTop:4}}>{v.tam} global market · Year 5 Target: ${(v.y5/1000)|0}M ARR · Deploy: {v.deploy}</div>
              </div>
              {isPlanted(v.id)?<span style={{fontSize:10,padding:"4px 10px",borderRadius:6,background:v.c+"20",color:v.c,fontWeight:600}}>PLANTED</span>
              :<button onClick={()=>{onPlant(v.id);setSel(null)}} style={{padding:"8px 16px",borderRadius:8,border:"none",background:v.c,color:"#000",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>🌱 Plant This Garden</button>}
            </div>
            <div style={{padding:"16px 22px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
              <div>
                <Sec t="What It Does" txt={v.w} c={v.c}/>
                <Sec t="How It Works" txt={v.h} c={C.blue}/>
                <Sec t="Why People Buy" txt={v.why} c={C.green}/>
              </div>
              <div>
                <Sec t="Revenue Model" txt={v.rev} c={C.gold}/>
                <Sec t="Market & Competition" txt={v.mkt} c={C.orange}/>
                <Sec t="The Moat" txt={v.moat} c={C.purple}/>
              </div>
            </div>
            <div style={{padding:"0 22px 16px"}}>
              <Sec t="Cross-Garden Synergy" txt={v.synergy} c={C.cyan}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SaveModal({saves,onSave,onLoad,onDelete,onClose}){
  const[n,setN]=useState("");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div className="fu" onClick={e=>e.stopPropagation()} style={{maxWidth:440,width:"100%",padding:20,borderRadius:16,background:"#121218",border:"1px solid rgba(255,255,255,.08)",maxHeight:"80vh",overflow:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontFamily:sf,fontSize:18,color:C.gold}}>Strategy Saves</span>
          <button onClick={onClose} style={{background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,color:"rgba(255,255,255,.4)",padding:"4px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Close</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <input value={n} onChange={e=>setN(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&n.trim()){onSave(n.trim());setN("")}}} placeholder="Name this strategy..." style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,.1)",background:"rgba(255,255,255,.04)",color:"#fff",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
          <button onClick={()=>{if(n.trim()){onSave(n.trim());setN("")}}} style={{padding:"8px 14px",borderRadius:8,border:"none",background:C.green,color:"#000",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
        </div>
        {saves.length===0?<div style={{textAlign:"center",padding:24,color:"rgba(255,255,255,.2)",fontSize:12}}>No saves yet. Make some decisions first!</div>
        :saves.map((s,i)=>(
          <div key={i} style={{padding:10,borderRadius:8,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)",marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:12,fontWeight:600,color:C.gold}}>{s.name}</div><div style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:1}}>{s.hist.length} decisions · Y5: ${(s.m.y5/1000).toFixed(0)}M</div></div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>onLoad(s)} style={{padding:"4px 8px",borderRadius:4,border:"1px solid "+C.green+"30",background:C.green+"10",color:C.green,fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>Load</button>
                <button onClick={()=>onDelete(i)} style={{padding:"4px 8px",borderRadius:4,border:"1px solid "+C.red+"30",background:C.red+"10",color:C.red,fontSize:9,cursor:"pointer",fontFamily:"inherit"}}>Del</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
