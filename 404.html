<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Health Knowledge Garden</title>
    <meta property="og:title" content="404 - Page Not Found">
    <meta property="og:description" content="The page you're looking for doesn't exist. Return to the Health Knowledge Garden.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..700;1,9..40,100..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #070710;
            --bg2: #0c0c18;
            --bg3: #111122;
            --bg4: #171730;
            --emerald: #34D399;
            --emerald-dim: rgba(52, 211, 153, 0.12);
            --violet: #A78BFA;
            --cyan: #22D3EE;
            --amber: #F59E0B;
            --orange: #F97316;
            --red: #EF4444;
            --pink: #F472B6;
            --purple: #8B5CF6;
            --text: #eef0f6;
            --text2: #94a3b8;
            --text3: #475569;
            --border: rgba(255, 255, 255, 0.06);
            --border2: rgba(255, 255, 255, 0.10);
            --border3: rgba(255, 255, 255, 0.16);
            --glass: rgba(12, 12, 24, 0.7);
            --glass2: rgba(12, 12, 24, 0.92);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-xs: 5px;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        h1, h2, h3, h4 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
        }

        code, .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        a {
            color: var(--emerald);
            text-decoration: none;
            transition: all 0.25s ease;
        }

        a:hover {
            opacity: 0.8;
        }

        /* Canvas background animation */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.35;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4);
            }
            50% {
                opacity: 0.6;
                box-shadow: 0 0 0 4px rgba(52, 211, 153, 0);
            }
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .fade-up {
            animation: fadeUp 0.6s ease-out both;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out both;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }

        /* DNA Hexagon Logo */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            filter: drop-shadow(0 0 40px rgba(52, 211, 153, 0.15));
            animation: logoFloat 6s ease-in-out infinite;
            opacity: 0.95;
        }

        .logo-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--emerald), var(--cyan) 50%, var(--violet));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: logoFloat 6s ease-in-out infinite;
        }

        /* Error Code */
        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--red), var(--orange) 50%, var(--amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main heading */
        h1 {
            font-size: 2.2rem;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        h1 .accent {
            background: linear-gradient(135deg, var(--emerald), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Description */
        .description {
            font-size: 1rem;
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Action buttons */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.85rem 1.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(12px);
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            text-decoration: none;
            display: inline-block;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--glass2);
            border-color: var(--border2);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--emerald-dim);
            border-color: rgba(52, 211, 153, 0.25);
            color: var(--emerald);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: rgba(52, 211, 153, 0.2);
            border-color: rgba(52, 211, 153, 0.4);
        }

        /* Flex layout for buttons on desktop */
        @media (min-width: 600px) {
            .actions {
                flex-direction: row;
                justify-content: center;
                gap: 1rem;
            }

            .btn {
                flex: 0 1 auto;
            }
        }

        /* Status indicator */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            color: var(--text3);
            margin-bottom: 2rem;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--emerald);
            animation: pulse 2s ease-in-out infinite;
        }

        /* Footer */
        .footer {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text3);
        }

        .footer a {
            color: var(--emerald);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .error-code {
                font-size: 3rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .logo {
                width: 80px;
                height: 80px;
            }

            .logo-placeholder {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <!-- Logo -->
        <div class="logo-wrapper fade-in">
            <div class="logo-placeholder">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:rgba(255,255,255,0.8);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:rgba(255,255,255,0.4);stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <!-- DNA Helix style hexagon -->
                    <path d="M32 4 L48 12 L48 28 L32 36 L16 28 L16 12 Z" fill="url(#hexGradient)" opacity="0.9"/>
                    <path d="M32 28 L48 36 L48 52 L32 60 L16 52 L16 36 Z" fill="url(#hexGradient)" opacity="0.7"/>
                </svg>
            </div>
        </div>

        <!-- Status -->
        <div class="status fade-up delay-1">
            <span class="live-dot"></span>
            Platform Online
        </div>

        <!-- Error Code -->
        <div class="error-code fade-up delay-1">404</div>

        <!-- Heading -->
        <h1 class="fade-up delay-2">
            Page Not <span class="accent">Found</span>
        </h1>

        <!-- Description -->
        <p class="description fade-up delay-2">
            The page you're looking for doesn't exist in the Knowledge Garden. Let's get you back to exploring healthcare data.
        </p>

        <!-- Actions -->
        <div class="actions fade-up delay-3">
            <a href="/" class="btn btn-primary">Return to Home</a>
            <a href="/browse/providers" class="btn">Browse Providers</a>
        </div>

        <!-- Footer -->
        <div class="footer fade-up delay-3">
            <p>
                Health Knowledge Garden •
                <a href="https://theknowledgegardens.com" target="_blank" rel="noopener">TheKnowledgeGardens.com</a>
            </p>
        </div>
    </div>

    <!-- Canvas particle background -->
    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Particle system
        const particles = [];
        const particleCount = 30;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            draw() {
                ctx.fillStyle = `rgba(52, 211, 153, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
        }

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
